<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGV Inspection System · K&S Cumnock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────────── */
/* DESIGN TOKENS — K&S light system                     */
/* ──────────────────────────────────────────────────── */
:root {
    --bg-base: #fafafa;
    --bg-elevated: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #fcfcfd;
    --bg-input: #ffffff;
    --bg-muted: #f4f4f5;

    --border-subtle: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;

    --text: #09090b;
    --text-secondary: #52525b;
    --text-tertiary: #71717a;
    --text-quaternary: #a1a1aa;

    --green: #16a34a;
    --green-soft: #dcfce7;
    --green-border: #86efac;
    --green-fg: #14532d;
    --amber: #d97706;
    --amber-soft: #fef3c7;
    --amber-border: #fcd34d;
    --amber-fg: #78350f;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --red-border: #fca5a5;
    --red-fg: #7f1d1d;
    --blue: #2563eb;
    --blue-soft: #dbeafe;
    --blue-border: #93c5fd;
    --blue-fg: #1e3a8a;

    --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    --radius: 8px;
    --radius-sm: 6px;
    --radius-lg: 12px;

    --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 4px 8px -2px rgba(16, 24, 40, 0.06), 0 2px 4px -2px rgba(16, 24, 40, 0.04);
    --shadow-lg: 0 12px 16px -4px rgba(16, 24, 40, 0.08), 0 4px 6px -2px rgba(16, 24, 40, 0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    background: var(--bg-base);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    min-height: 100vh;
}
body {
    display: flex;
    flex-direction: column;
}
main {
    flex: 1 0 auto;
    width: 100%;
}
footer {
    flex-shrink: 0;
}

.mono {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
}

button { font-family: inherit; cursor: pointer; }
a { color: inherit; }

/* ──────────────────────────────────────────────────── */
/* TOPBAR                                               */
/* ──────────────────────────────────────────────────── */
.topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(250, 250, 250, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
}
.topbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}
.brand {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-right: 20px;
    border-right: 1px solid var(--border);
    height: 40px;
}
.brand-logo {
    height: 30px;
    width: auto;
    display: block;
}
.brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}
.brand-text .name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
}
.brand-text .sub {
    font-size: 10px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
}

.stats-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
}
.stat-pill {
    display: inline-flex;
    flex-direction: column;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-elevated);
    min-width: 76px;
    transition: background 0.12s, border-color 0.12s;
}
.stat-pill .stat-value {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
}
.stat-pill .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
    font-weight: 500;
}

/* ──────────────────────────────────────────────────── */
/* MAIN LAYOUT                                          */
/* ──────────────────────────────────────────────────── */
main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 24px 60px;
}
.page-header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}
.page-header-text {
    min-width: 0;
}
.page-header h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
}
.page-header .sub {
    margin-top: 6px;
    color: var(--text-secondary);
    font-size: 14px;
}
.btn-lg {
    height: 38px;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 600;
}
.btn-lg svg { width: 15px; height: 15px; }

/* ──────────────────────────────────────────────────── */
/* SAVED INSPECTIONS SECTION                            */
/* ──────────────────────────────────────────────────── */
.section {
    margin-top: 36px;
    display: none;
    animation: fade-in 0.25s ease;
}
.section.active { display: block; }
@keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
}
.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.section-header h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
}
.section-header .count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-muted);
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 500;
    border: 1px solid var(--border-subtle);
}

/* Field */
.field {
    display: inline-flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 34px;
    overflow: hidden;
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
    min-width: 280px;
}
.field:hover { border-color: var(--border-strong); }
.field:focus-within {
    border-color: var(--text);
    box-shadow: 0 0 0 3px rgba(9, 9, 11, 0.06);
}
.field .field-icon {
    width: 14px;
    height: 14px;
    color: var(--text-tertiary);
    margin: 0 0 0 12px;
    flex-shrink: 0;
}
.field input {
    background: transparent;
    border: none;
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--text);
    padding: 0 12px;
    outline: none;
    flex: 1;
    min-width: 0;
}

/* Buttons */
.btn {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12.5px;
    font-weight: 500;
    padding: 0 12px;
    height: 32px;
    border-radius: var(--radius);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.05s ease;
    white-space: nowrap;
}
.btn:hover { background: var(--bg-muted); border-color: var(--border-strong); }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
    background: var(--text);
    color: #fafafa;
    border-color: var(--text);
}
.btn-primary:hover { background: #27272a; border-color: #27272a; }
.btn svg { width: 13px; height: 13px; stroke-width: 1.75; }

/* ──────────────────────────────────────────────────── */
/* INSPECTION CARDS                                     */
/* ──────────────────────────────────────────────────── */
.inspections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
}
.inspection-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
}
.inspection-card:hover {
    border-color: var(--border-strong);
    background: var(--bg-card-hover);
    box-shadow: var(--shadow-sm);
}
.inspection-card .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}
.type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid;
    flex-shrink: 0;
    white-space: nowrap;
}
.type-badge.draft {
    background: var(--amber-soft);
    border-color: var(--amber-border);
    color: var(--amber-fg);
}
.type-badge.source {
    background: var(--bg-muted);
    border-color: var(--border);
    color: var(--text-secondary);
}
.type-badge.pdf {
    background: var(--green-soft);
    border-color: var(--green-border);
    color: var(--green-fg);
}
.type-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}
.type-badge.draft .dot { background: var(--amber); }
.type-badge.source .dot { background: var(--text-tertiary); }
.type-badge.pdf .dot { background: var(--green); }

.inspection-card .filename {
    font-family: var(--font-mono);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
    line-height: 1.4;
}
.inspection-card .meta {
    display: flex;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-tertiary);
    font-variant-numeric: tabular-nums;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.inspection-card .actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
}
.inspection-card .actions .btn { flex: 1; }

/* ──────────────────────────────────────────────────── */
/* STATES                                               */
/* ──────────────────────────────────────────────────── */
.placeholder-state {
    grid-column: 1 / -1;
    padding: 56px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    color: var(--text-tertiary);
}
.placeholder-state .placeholder-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto 12px;
    color: var(--text-quaternary);
}
.placeholder-state .placeholder-icon svg {
    width: 100%;
    height: 100%;
    stroke-width: 1.5;
}
.placeholder-state .label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
}
.placeholder-state .sublabel {
    font-size: 12px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
}
.spinner {
    width: 22px;
    height: 22px;
    border: 2.5px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ──────────────────────────────────────────────────── */
/* TOAST                                                */
/* ──────────────────────────────────────────────────── */
.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fafafa;
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--green-fg); }
.toast.error { background: var(--red-fg); }

/* ──────────────────────────────────────────────────── */
/* FOOTER                                               */
/* ──────────────────────────────────────────────────── */
footer {
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
    padding: 18px 24px;
    margin-top: 60px;
}
.footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
}
.footer-inner a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.12s;
}
.footer-inner a:hover { color: var(--text); }

/* ──────────────────────────────────────────────────── */
/* RESPONSIVE                                           */
/* ──────────────────────────────────────────────────── */
@media (max-width: 720px) {
    .topbar-inner { gap: 12px; padding: 12px 16px; }
    .brand { border-right: none; padding-right: 0; }
    .brand-logo { height: 26px; }
    .stats-strip { width: 100%; order: 3; overflow-x: auto; padding-bottom: 2px; }
    .stat-pill { min-width: auto; flex: 1; }
    main { padding: 24px 16px 40px; }
    .page-header h1 { font-size: 20px; }
    .field { min-width: 100%; width: 100%; }
    .section-header { align-items: stretch; }
    footer { padding: 16px; }
    .footer-inner { flex-direction: column; align-items: flex-start; gap: 6px; }
}
</style>
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <img class="brand-logo" src="kandslogo.png" alt="Kerr & Smith">
            <div class="brand-text">
                <span class="name">HGV Inspection System</span>
                <span class="sub">K&amp;S Cumnock · Safety Manager</span>
            </div>
        </div>
        <div class="stats-strip">
            <div class="stat-pill"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total</span></div>
            <div class="stat-pill"><span class="stat-value" id="statDrafts">—</span><span class="stat-label">Drafts</span></div>
            <div class="stat-pill"><span class="stat-value" id="statPDFs">—</span><span class="stat-label">PDFs</span></div>
        </div>
    </div>
</header>

<main>
    <div class="page-header">
        <div class="page-header-text">
            <h1>Heavy goods vehicle inspections</h1>
            <p class="sub">Create, edit, and download DVSA-compliant safety inspection records.</p>
        </div>
        <button class="btn btn-primary btn-lg" onclick="startNewInspection()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New inspection
        </button>
    </div>

    <section id="inspectionsSection" class="section">
        <div class="section-header">
            <h2>Saved inspections <span class="count" id="resultsCount">0</span></h2>
            <div class="field">
                <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" id="searchBar" placeholder="Search by registration, date, filename…" oninput="filterInspections()">
            </div>
        </div>
        <div id="inspectionsGrid" class="inspections-grid"></div>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <div>© Kerr &amp; Smith Cumnock Ltd · All Rights Reserved</div>
        <div>
            <a href="mailto:service@kerrandsmith.co.uk">service@kerrandsmith.co.uk</a> · <a href="tel:01290422440">01290 422440</a>
        </div>
    </div>
</footer>

<div class="toast" id="toast"></div>

<script>
const GITHUB_OWNER = 'KSCumnock';
const GITHUB_REPO = 'HGV_Inspections';
const GITHUB_PATH = 'Inspections';
const CLOUDFLARE_WORKER_URL = 'https://hgv-inspection-token.ske-d03.workers.dev';
let allFiles = [];

/* ──────────────────────────────────────────────────── */
/* NAVIGATION TO INSPECTION APP                         */
/* ──────────────────────────────────────────────────── */
function startNewInspection() {
    // Clear any leftover load state so we start clean
    localStorage.removeItem('hgv_inspection_load');
    localStorage.removeItem('hgv_inspection_filename');
    localStorage.removeItem('hgv_inspection_autoPDF');
    window.location.href = 'hgv-inspection-app.html';
}

/* ──────────────────────────────────────────────────── */
/* FETCH INSPECTIONS FROM GITHUB                        */
/* ──────────────────────────────────────────────────── */
async function fetchInspections({ silent = false, autoOpen = true } = {}) {
    const section = document.getElementById('inspectionsSection');
    const grid = document.getElementById('inspectionsGrid');
    if (autoOpen) section.classList.add('active');
    if (!silent) {
        grid.innerHTML = `
            <div class="placeholder-state">
                <div class="spinner"></div>
                <div class="label">Loading inspections from GitHub…</div>
            </div>`;
    }

    try {
        const tokenResponse = await fetch(CLOUDFLARE_WORKER_URL);
        if (!tokenResponse.ok) throw new Error('Authentication failed');
        const { token } = await tokenResponse.json();

        const response = await fetch(
            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`,
            { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } }
        );
        if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);

        const files = await response.json();
        allFiles = files
            .filter(f => /\.(json|pdf)$/i.test(f.name))
            .sort((a, b) => b.name.localeCompare(a.name));

        updateStats();
        renderInspections(allFiles);

        if (!silent) {
            showToast(`Loaded ${allFiles.length} inspection${allFiles.length === 1 ? '' : 's'}`, 'success');
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
        }
    } catch (error) {
        console.error('Error fetching inspections:', error);
        if (!silent) {
            grid.innerHTML = `
                <div class="placeholder-state">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                    <div class="label">Couldn't load inspections</div>
                    <div class="sublabel">${escapeHTML(error.message)}</div>
                </div>`;
            showToast(error.message, 'error');
        }
    }
}

function baseName(filename) {
    return filename.replace(/\.(json|pdf)$/i, '');
}

function getPDFBaseNames() {
    return new Set(
        allFiles
            .filter(f => f.name.toLowerCase().endsWith('.pdf'))
            .map(f => baseName(f.name))
    );
}

function updateStats() {
    const pdfBases = getPDFBaseNames();
    const uniqueInspections = new Set(allFiles.map(f => baseName(f.name))).size;
    const drafts = allFiles.filter(f =>
        f.name.toLowerCase().endsWith('.json') && !pdfBases.has(baseName(f.name))
    ).length;
    const pdfs = pdfBases.size;
    document.getElementById('statTotal').textContent = uniqueInspections;
    document.getElementById('statDrafts').textContent = drafts;
    document.getElementById('statPDFs').textContent = pdfs;
}

/* ──────────────────────────────────────────────────── */
/* RENDER CARDS                                         */
/* ──────────────────────────────────────────────────── */
function renderInspections(files) {
    const grid = document.getElementById('inspectionsGrid');
    document.getElementById('resultsCount').textContent = files.length;

    if (files.length === 0) {
        grid.innerHTML = `
            <div class="placeholder-state">
                <div class="placeholder-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="label">No matching inspections</div>
                <div class="sublabel">Try a different search term.</div>
            </div>`;
        return;
    }

    grid.innerHTML = '';
    const pdfBases = getPDFBaseNames();
    files.forEach(file => {
        const isJSON = file.name.toLowerCase().endsWith('.json');
        const displayName = baseName(file.name);
        const hasPairedPDF = isJSON && pdfBases.has(displayName);

        const card = document.createElement('div');
        card.className = 'inspection-card';

        let badge;
        if (isJSON && hasPairedPDF) {
            badge = '<span class="type-badge source" title="Editable data for a finalised PDF"><span class="dot"></span>Source</span>';
        } else if (isJSON) {
            badge = '<span class="type-badge draft" title="Not yet finalised — no PDF generated"><span class="dot"></span>Draft</span>';
        } else {
            badge = '<span class="type-badge pdf"><span class="dot"></span>PDF</span>';
        }

        const actions = isJSON
            ? `
                <button class="btn" data-action="edit" data-url="${escapeHTML(file.download_url)}" data-name="${escapeHTML(file.name)}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                    Edit
                </button>
                <button class="btn btn-primary" data-action="generate-pdf" data-url="${escapeHTML(file.download_url)}" data-name="${escapeHTML(file.name)}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Generate PDF
                </button>`
            : `
                <button class="btn btn-primary" data-action="download" data-url="${escapeHTML(file.download_url)}" data-name="${escapeHTML(file.name)}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>`;

        card.innerHTML = `
            <div class="card-top">
                <div class="filename">${escapeHTML(displayName)}</div>
                ${badge}
            </div>
            <div class="meta">
                <span>${formatBytes(file.size)}</span>
            </div>
            <div class="actions">${actions}</div>
        `;
        grid.appendChild(card);
    });
}

// Event delegation for the dynamically-rendered card buttons
document.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const url = btn.dataset.url;
    const name = btn.dataset.name;
    if (action === 'edit') editInspection(url, name);
    else if (action === 'generate-pdf') generatePDFFromJSON(url, name, btn);
    else if (action === 'download') downloadPDF(url, name);
});

function filterInspections() {
    const query = document.getElementById('searchBar').value.toLowerCase().trim();
    const filtered = query ? allFiles.filter(f => f.name.toLowerCase().includes(query)) : allFiles;
    renderInspections(filtered);
}

/* ──────────────────────────────────────────────────── */
/* CARD ACTIONS                                         */
/* ──────────────────────────────────────────────────── */
async function editInspection(downloadUrl, originalName) {
    try {
        showToast('Loading inspection…');
        const response = await fetch(downloadUrl);
        if (!response.ok) throw new Error('Failed to fetch inspection data');
        const data = await response.json();

        localStorage.setItem('hgv_inspection_load', JSON.stringify(data));
        localStorage.setItem('hgv_inspection_filename', originalName);
        localStorage.removeItem('hgv_inspection_autoPDF');

        window.location.href = 'hgv-inspection-app.html';
    } catch (error) {
        console.error('Error loading inspection:', error);
        showToast(error.message, 'error');
    }
}

// Generate PDF from a JSON draft by loading it into the inspection app,
// auto-triggering its existing PDF function, then returning to this page.
// This re-uses all the form-rendering code so the PDF looks identical to
// what you'd get if you opened the draft and hit "Save as PDF" yourself.
async function generatePDFFromJSON(downloadUrl, originalName, btn) {
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<div style="width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite"></div> Preparing…';
    }
    try {
        showToast('Preparing PDF — opening inspection…');
        const response = await fetch(downloadUrl);
        if (!response.ok) throw new Error('Failed to fetch inspection data');
        const data = await response.json();

        localStorage.setItem('hgv_inspection_load', JSON.stringify(data));
        localStorage.setItem('hgv_inspection_filename', originalName);
        localStorage.setItem('hgv_inspection_autoPDF', 'return-to-index');

        window.location.href = 'hgv-inspection-app.html';
    } catch (error) {
        console.error('Error generating PDF:', error);
        showToast(error.message, 'error');
        if (btn) {
            btn.disabled = false;
            btn.textContent = 'Generate PDF';
        }
    }
}

async function downloadPDF(url, filename) {
    try {
        showToast('Downloading PDF…');
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(blobUrl);
        document.body.removeChild(a);
        showToast(`Downloaded ${filename}`, 'success');
    } catch (error) {
        console.error('Error downloading PDF:', error);
        showToast(error.message, 'error');
    }
}

/* ──────────────────────────────────────────────────── */
/* UTILITIES                                            */
/* ──────────────────────────────────────────────────── */
function formatBytes(bytes) {
    if (!bytes) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(i === 0 ? 0 : 1) + ' ' + sizes[i];
}

function escapeHTML(str) {
    return String(str ?? '').replace(/[&<>"']/g, m => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]
    ));
}

let toastTimer;
function showToast(message, kind = '') {
    const toast = document.getElementById('toast');
    toast.className = 'toast show' + (kind ? ' ' + kind : '');
    toast.textContent = message;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3200);
}

/* ──────────────────────────────────────────────────── */
/* AUTO-LOAD ON PAGE OPEN                               */
/* Fetch inspections silently so stats + list are       */
/* ready immediately, without a noisy toast or scroll.  */
/* ──────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
    const returningFromPDF = sessionStorage.getItem('hgv_pdf_just_generated');
    if (returningFromPDF) {
        sessionStorage.removeItem('hgv_pdf_just_generated');
        setTimeout(() => showToast('PDF generated and downloaded', 'success'), 250);
    }
    fetchInspections({ silent: true, autoOpen: true });
});
</script>
