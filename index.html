    });
}

// startTime/finishTime are full ISO datetimes — only the time of day matters
function fmtScheduleTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' });
}
// "HH:MM" → ISO datetime (using a stable reference date)
function timeToIso(hhmm) {
    if (!/^\d{2}:\d{2}$/.test(hhmm)) return null;
    return `2025-01-01T${hhmm}:00Z`;
}
function isoToTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const hh = String(d.getUTCHours()).padStart(2, '0');
    const mm = String(d.getUTCMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
}

function openEmployeeForm(empId) {
    const editing = empId ? state.employees.find(e => e.id === empId) : null;
    const title = editing ? 'Edit employee' : 'Add employee';
    openModal(`
        <div class="modal-header">
            <div class="modal-title">${title}</div>
            <button class="drawer-close" data-action="close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="field-group">
                <label for="fldName">Name</label>
                <input type="text" id="fldName" value="${editing ? editing.name.replace(/"/g, '&quot;') : ''}" autocomplete="off" />
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label for="fldDept">Department</label>
                    <input type="text" id="fldDept" value="${editing ? (editing.department || '').replace(/"/g, '&quot;') : ''}" list="deptList" autocomplete="off" />
                    <datalist id="deptList">
                        ${[...new Set(state.employees.map(e => e.department).filter(Boolean))].sort().map(d => `<option value="${d}"></option>`).join('')}
                    </datalist>
                </div>
                <div class="field-group">
                    <label for="fldPin">PIN (4 digits)</label>
                    <input type="text" id="fldPin" inputmode="numeric" maxlength="4" pattern="\\d{4}" value="${editing ? editing.pin : ''}" autocomplete="off" />
                </div>
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label for="fldStart">Start time</label>
                    <input type="time" id="fldStart" value="${editing ? isoToTime(editing.startTime) : '08:30'}" />
                </div>
                <div class="field-group">
                    <label for="fldFinish">Finish time</label>
                    <input type="time" id="fldFinish" value="${editing ? isoToTime(editing.finishTime) : '17:00'}" />
                </div>
            </div>
            <div class="field-group">
                <div class="checkbox-row">
                    <input type="checkbox" id="fldFlex" ${editing && editing.hasFlexibleSchedule ? 'checked' : ''} />
                    <label for="fldFlex">Flexible schedule (can take break or lunch in any order)</label>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn" data-action="close">Cancel</button>
            <button class="btn btn-primary" id="empSaveBtn">${editing ? 'Save changes' : 'Add employee'}</button>
        </div>
    `);

    document.querySelectorAll('[data-action="close"]').forEach(b => b.addEventListener('click', closeModal));

    document.getElementById('empSaveBtn').addEventListener('click', async () => {
        const payload = {
            name: document.getElementById('fldName').value.trim(),
            department: document.getElementById('fldDept').value.trim(),
            pin: document.getElementById('fldPin').value.trim(),
            startTime: timeToIso(document.getElementById('fldStart').value),
            finishTime: timeToIso(document.getElementById('fldFinish').value),
            hasFlexibleSchedule: document.getElementById('fldFlex').checked,
        };
        if (!payload.name) return modalError('Name required');
        if (!payload.department) return modalError('Department required');
        if (!/^\d{4}$/.test(payload.pin)) return modalError('PIN must be 4 digits');
        if (!payload.startTime || !payload.finishTime) return modalError('Start/finish times required');

        const btn = document.getElementById('empSaveBtn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            if (editing) {
                await auth.api('PUT', `/employees/${editing.id}`, payload);
            } else {
                await auth.api('POST', '/employees', payload);
            }
            closeModal();
            await refresh();
            renderEmployeesDrawer();
        } catch (err) {
            btn.disabled = false;
            btn.textContent = editing ? 'Save changes' : 'Add employee';
            modalError(err.message);
        }
    });
}

function confirmDeleteEmployee(empId) {
    const emp = state.employees.find(e => e.id === empId);
    if (!emp) return;
    const clockingsCount = state.clockings.filter(c => c.employeeId === empId && !c.deleted).length;
    const warning = clockingsCount > 0
        ? `<div class="modal-info"><strong>${emp.name}</strong> has <strong>${clockingsCount}</strong> clocking ${clockingsCount === 1 ? 'entry' : 'entries'} on record. Deleting the employee will leave those entries orphaned — they'll still exist in the data but won't be visible in the dashboard.</div>`
        : `<div class="modal-info">No clockings recorded for <strong>${emp.name}</strong>. Safe to delete.</div>`;
    openModal(`
        <div class="modal-header">
            <div class="modal-title">Delete ${emp.name}?</div>
            <button class="drawer-close" data-action="close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            ${warning}
            <p style="font-size: 13px; color: var(--text-secondary);">This action removes the employee from the active list. Their PIN will no longer work for clocking in.</p>
        </div>
        <div class="modal-actions">
            <button class="btn" data-action="close">Cancel</button>
            <button class="btn btn-danger" id="empDeleteBtn">Delete employee</button>
        </div>
    `);
    document.querySelectorAll('[data-action="close"]').forEach(b => b.addEventListener('click', closeModal));
    document.getElementById('empDeleteBtn').addEventListener('click', async () => {
        const btn = document.getElementById('empDeleteBtn');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        try {
            await auth.api('DELETE', `/employees/${empId}${clockingsCount > 0 ? '?force=true' : ''}`);
            closeModal();
            await refresh();
            renderEmployeesDrawer();
        } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Delete employee';
            modalError(err.message);
        }
    });
}

// ════════════════════════════════════════════════════════════════════════
// CLOCKING MANAGEMENT (used inside evaluation drawer)
// ════════════════════════════════════════════════════════════════════════
const ENTRY_TYPES_FOR_FORM = [
    'Clock In', 'Clock Out',
    'Break Start', 'Break End',
    'Lunch Start', 'Lunch End',
    'Sick Day',
];

function openClockingForm(empId, entry = null) {
    const emp = state.employees.find(e => e.id === empId);
    if (!emp) return;
    const editing = !!entry;
    const title = editing ? 'Edit clocking' : `Add clocking — ${emp.name}`;
    const now = new Date();
    const defaultLocal = (entry ? new Date(entry.timestamp) : now);
    // datetime-local needs YYYY-MM-DDTHH:MM in LOCAL time
    const dtLocal = `${defaultLocal.getFullYear()}-${String(defaultLocal.getMonth()+1).padStart(2,'0')}-${String(defaultLocal.getDate()).padStart(2,'0')}T${String(defaultLocal.getHours()).padStart(2,'0')}:${String(defaultLocal.getMinutes()).padStart(2,'0')}`;

    openModal(`
        <div class="modal-header">
            <div class="modal-title">${title}</div>
            <button class="drawer-close" data-action="close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="field-group">
                <label for="clkType">Type</label>
                <select id="clkType">
                    ${ENTRY_TYPES_FOR_FORM.map(t => `<option value="${t}" ${entry && entry.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
            </div>
            <div class="field-group">
                <label for="clkTime">Date &amp; time</label>
                <input type="datetime-local" id="clkTime" value="${dtLocal}" />
                <div class="help">Time is recorded in local time (BST/GMT). Use this to correct missed or forgotten clockings.</div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn" data-action="close">Cancel</button>
            <button class="btn btn-primary" id="clkSaveBtn">${editing ? 'Save changes' : 'Add clocking'}</button>
        </div>
    `);
    document.querySelectorAll('[data-action="close"]').forEach(b => b.addEventListener('click', closeModal));

    document.getElementById('clkSaveBtn').addEventListener('click', async () => {
        const type = document.getElementById('clkType').value;
        const timeLocal = document.getElementById('clkTime').value;
        if (!timeLocal) return modalError('Date/time required');
        // datetime-local is parsed as local time; convert to ISO UTC
        const iso = new Date(timeLocal).toISOString().replace(/\.\d+Z$/, 'Z');

        const btn = document.getElementById('clkSaveBtn');
        btn.disabled = true;
        btn.textContent = 'Saving…';
        try {
            if (editing) {
                await auth.api('PUT', `/clockings/${entry.id}`, { type, timestamp: iso });
            } else {
                await auth.api('POST', '/clockings', { employeeId: empId, type, timestamp: iso });
            }
            closeModal();
            await refresh();
            if (state.selectedEmployeeId) renderDrawer();
        } catch (err) {
            btn.disabled = false;
            btn.textContent = editing ? 'Save changes' : 'Add clocking';
            modalError(err.message);
        }
    });
}

function confirmDeleteClocking(entry) {
    const emp = state.employees.find(e => e.id === entry.employeeId);
    const when = new Date(entry.timestamp).toLocaleString('en-GB');
    openModal(`
        <div class="modal-header">
            <div class="modal-title">Delete clocking?</div>
            <button class="drawer-close" data-action="close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="modal-info">
                <strong>${entry.type}</strong> for <strong>${emp ? emp.name : 'employee'}</strong> on ${when}
            </div>
            <p style="font-size: 13px; color: var(--text-secondary);">
                This is a soft delete — the entry is flagged as deleted but kept for audit. It won't appear in the dashboard or reports.
            </p>
        </div>
        <div class="modal-actions">
            <button class="btn" data-action="close">Cancel</button>
            <button class="btn btn-danger" id="clkDeleteBtn">Delete</button>
        </div>
    `);
    document.querySelectorAll('[data-action="close"]').forEach(b => b.addEventListener('click', closeModal));
    document.getElementById('clkDeleteBtn').addEventListener('click', async () => {
        const btn = document.getElementById('clkDeleteBtn');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        try {
            await auth.api('DELETE', `/clockings/${entry.id}`);
            closeModal();
            await refresh();
            if (state.selectedEmployeeId) renderDrawer();
        } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Delete';
            modalError(err.message);
        }
    });
}

// ════════════════════════════════════════════════════════════════════════
// BOOT — ensure data is loaded after PIN unlock
// ════════════════════════════════════════════════════════════════════════
let _booted = false;
async function ensureBooted() {
    if (_booted) return;
    _booted = true;
    setDefaultDateRange();
    bindEvents();
    await refresh();
    state.refreshTimer = setInterval(refresh, REFRESH_INTERVAL_MS);
    setInterval(() => { renderRows(); }, 60_000);
    // Backup status: poll every 5 minutes (cron runs every 6h so once-an-hour would suffice
    // but 5min gives quick post-cron confirmation)
    fetchBackupStatus();
    setInterval(fetchBackupStatus, 5 * 60_000);
}

// Backup status indicator in topbar — links to the GitHub commit on hover
async function fetchBackupStatus() {
    const pill = document.getElementById('backupPill');
    const label = document.getElementById('backupPillLabel');
    if (!pill || !label) return;
    try {
        const r = await fetch(`${WORKER_URL}/backup/status`, { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        if (!data.lastBackupAt) {
            pill.dataset.state = 'missing';
            label.textContent = 'Backup: pending';
            pill.title = 'No backup has run yet. Tap to run one now, or the scheduled cron will fire every 6 hours.';
            return;
        }
        const ageMin = (Date.now() - new Date(data.lastBackupAt).getTime()) / 60_000;
        const ageStr = ageMin < 1
            ? 'just now'
            : ageMin < 60
                ? `${Math.round(ageMin)}m ago`
                : ageMin < 60 * 24
                    ? `${Math.round(ageMin / 60)}h ago`
                    : `${Math.round(ageMin / (60 * 24))}d ago`;
        // 6h is the scheduled cron — anything over 9h is "stale"
        pill.dataset.state = ageMin > 9 * 60 ? 'stale' : '';
        label.textContent = `Backup: ${ageStr}`;
        pill.title = `Last backup: ${new Date(data.lastBackupAt).toLocaleString('en-GB')}\nTap to run a new backup now.`;
    } catch (err) {
        pill.dataset.state = 'missing';
        label.textContent = 'Backup: ?';
        pill.title = `Could not fetch backup status: ${err.message}`;
    }
}

// Manual backup trigger — same code path as the scheduled cron. Admin-auth gated.
// The backup pill itself is the trigger now (tap to run backup).
async function runBackupNow() {
    const pill = document.getElementById('backupPill');
    const label = document.getElementById('backupPillLabel');
    if (!pill || pill.disabled) return;

    pill.disabled = true;
    pill.classList.add('spinning');
    if (label) label.textContent = 'Backing up…';

    try {
        await auth.api('POST', '/backup/now');
        // Refresh status pill to show the new "just now" timestamp
        await fetchBackupStatus();
    } catch (err) {
        console.error('Backup failed:', err);
        alert(`Backup failed: ${err.message}`);
        // Restore previous pill state
        await fetchBackupStatus();
    } finally {
        pill.disabled = false;
        pill.classList.remove('spinning');
    }
}

// ════════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════════
function populateDepartmentFilter() {
    const sel = document.getElementById('departmentFilter');
    const depts = Array.from(new Set(state.employees.map(e => e.department).filter(Boolean))).sort();
    // Preserve current selection
    const current = state.filters.department;
    sel.innerHTML = `<option value="all">All</option>` +
        depts.map(d => `<option value="${d}">${d}</option>`).join('');
    sel.value = depts.includes(current) ? current : 'all';
}

function setDefaultDateRange() {
    // Default: past 7 days inclusive of today
    const today = new Date();
    const start = new Date();
    start.setDate(today.getDate() - 6);
    state.filters.startDate = localDateStr(start);
    state.filters.endDate = localDateStr(today);
    updateRangeLabel();
}

function bindEvents() {
    document.getElementById('departmentFilter').addEventListener('change', (e) => {
        state.filters.department = e.target.value;
        renderRows();
    });
    document.getElementById('statusFilter').addEventListener('change', (e) => {
        state.filters.status = e.target.value;
        renderRows();
    });
    document.getElementById('sortBy').addEventListener('change', (e) => {
        state.filters.sortBy = e.target.value;
        renderRows();
    });
    // Debounce search by 150ms — typing fast shouldn't trigger a render per keystroke
    let searchTimer = null;
    document.getElementById('employeeSearch').addEventListener('input', (e) => {
        const val = e.target.value;
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            state.filters.search = val;
            renderRows();
        }, 150);
    });
    bindPicker();
}

async function refresh() {
    try {
        await fetchData();
        populateDepartmentFilter();
        renderRows();
        if (state.selectedEmployeeId) {
            // Skip drawer re-render if user is actively editing notes — would clobber input
            const notesEl = document.getElementById('evalNotes');
            const notesFocused = notesEl && document.activeElement === notesEl;
            if (!notesFocused) renderDrawer();
        }
    } catch (err) {
        console.error('Refresh failed', err);
    }
}

async function init() {
    // Bind PIN screen handlers
    bindPinScreen();

    // Wire up the kebab menu (Export / Staff link / Manage / GitHub / Sign out)
    bindMenuDropdown();

    // Backup pill is now a button — tap runs a manual backup
    document.getElementById('backupPill').addEventListener('click', runBackupNow);

    // If we have a valid session, skip the PIN screen and boot directly
    if (auth.getToken()) {
        document.getElementById('pinScreen').classList.add('hidden');
        await ensureBooted();
    } else {
        // Otherwise the PIN screen is already shown (default state in HTML)
        showPinScreen();
    }
}

function bindMenuDropdown() {
    const btn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('menuDropdown');
    if (!btn || !dropdown) return;

    // The [hidden] attribute is on the dropdown initially; remove it so CSS
    // .open/.closed states control visibility from here on.
    dropdown.removeAttribute('hidden');

    let onDocClick, onEsc;
    function openMenu() {
        dropdown.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
        // Attach outside-click and escape listeners next tick so the click that
        // opened the menu doesn't also immediately close it.
        setTimeout(() => {
            onDocClick = (e) => {
                if (!dropdown.contains(e.target) && !btn.contains(e.target)) closeMenu();
            };
            onEsc = (e) => { if (e.key === 'Escape') closeMenu(); };
            document.addEventListener('click', onDocClick);
            document.addEventListener('keydown', onEsc);
        }, 0);
    }
    function closeMenu() {
        dropdown.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        if (onDocClick) document.removeEventListener('click', onDocClick);
        if (onEsc) document.removeEventListener('keydown', onEsc);
        onDocClick = onEsc = null;
    }

    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (dropdown.classList.contains('open')) closeMenu();
        else openMenu();
    });

    // Action buttons inside the dropdown
    dropdown.querySelectorAll('[data-action]').forEach(item => {
        item.addEventListener('click', () => {
            const action = item.dataset.action;
            closeMenu();
            if (action === 'export') {
                exportCSV();
            } else if (action === 'manage') {
                openEmployeesDrawer();
            } else if (action === 'signout') {
                if (confirm('Sign out?')) auth.signOut();
            }
        });
    });

    // Plain links (Staff page, GitHub) should just close the menu and follow the href
    dropdown.querySelectorAll('a.menu-item').forEach(a => {
        a.addEventListener('click', closeMenu);
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>
