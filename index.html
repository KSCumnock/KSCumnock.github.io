const AUTH_TOKEN_KEY = 'ks-tk-admin-token';
const AUTH_EXPIRES_KEY = 'ks-tk-admin-expires';

// Data reads go through the Worker (not raw.githubusercontent) to bypass
// the GitHub CDN's ~5min cache. The Worker uses GitHub Contents + Blobs
// APIs internally, which always return the latest commit.
const ENDPOINT_EMPLOYEES = `${WORKER_URL}/data/employees`;
const ENDPOINT_CLOCKINGS = `${WORKER_URL}/data/entries`;

const WORKDAY_START_HOUR = 7;   // timeline scale start
const WORKDAY_END_HOUR = 19;    // timeline scale end
const TIMELINE_HOURS = WORKDAY_END_HOUR - WORKDAY_START_HOUR;

const REFRESH_INTERVAL_MS = 30_000;

const STATUS_LABELS = {
    working: 'Working',
    break:   'On break',
    lunch:   'At lunch',
    out:     'Clocked out',
    absent:  'Not in today',
    sick:    'Sick day',
};

// ════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════
const state = {
    employees: [],
    clockings: [],
    filters: {
        startDate: '',
        endDate: '',
        department: 'all',
        status: 'all',
        sortBy: 'status',
        search: '',
    },
    selectedEmployeeId: null,
    lastUpdated: null,
    refreshTimer: null,
};

// ════════════════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════════════════
// Local-date YYYY-MM-DD (NOT toISOString which UTC-shifts and breaks in BST)
const localDateStr = (d = new Date()) => d.toLocaleDateString('en-CA');

const startOfDay = (dateStr) => {
    // dateStr = 'YYYY-MM-DD' → Date at local midnight
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d, 0, 0, 0, 0);
};

const fmtTimeOfDay = (d) => d ? d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '—';

const fmtDuration = (ms) => {
    if (ms == null || isNaN(ms) || ms < 0) return '—';
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h === 0) return `${m}m`;
    return `${h}h ${m.toString().padStart(2, '0')}m`;
};

const fmtDurationCompact = (ms) => {
    if (ms == null || isNaN(ms) || ms < 0) return '—';
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return `${h}h ${m.toString().padStart(2, '0')}m`;
};

const initials = (name = '') => {
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return '?';
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
};

// Stable colour from id
const colorOf = (id) => {
    const s = String(id);
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) & 0xffffffff;
    return Math.abs(h) % 8;
};

const dayLabel = (dateStr) => {
    const d = startOfDay(dateStr);
    const wk = d.toLocaleDateString('en-GB', { weekday: 'short' });
    const day = d.getDate();
    return { wk, day };
};

const fullDateLabel = (dateStr) =>
    startOfDay(dateStr).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });

const isWeekend = (dateStr) => {
    const d = startOfDay(dateStr).getDay();
    return d === 0 || d === 6;
};

const daysBetween = (startStr, endStr) => {
    const out = [];
    const cur = startOfDay(startStr);
    const end = startOfDay(endStr);
    while (cur <= end) {
        out.push(localDateStr(cur));
        cur.setDate(cur.getDate() + 1);
    }
    return out;
};

// ════════════════════════════════════════════════════════════════════════
// DATA FETCH
// ════════════════════════════════════════════════════════════════════════
async function fetchData() {
    const ts = Date.now();
    const [employees, clockings] = await Promise.all([
        fetch(`${ENDPOINT_EMPLOYEES}?t=${ts}`, { cache: 'no-store' }).then(r => r.json()),
        fetch(`${ENDPOINT_CLOCKINGS}?t=${ts}`, { cache: 'no-store' }).then(r => r.json()),
    ]);
    state.employees = employees;
    state.clockings = clockings;
    state.lastUpdated = new Date();
}

// ════════════════════════════════════════════════════════════════════════
// COMPUTATION
// ════════════════════════════════════════════════════════════════════════
// Group clockings by employeeId → date (YYYY-MM-DD) → entries[]
// Cache the grouped-by-employee map since it's the heaviest part of a render
// (full pass over all ~17k entries with date parsing). Invalidates whenever
// the clockings array length changes, which is sufficient — adds, edits and
// deletes all bump or change the length via the refresh cycle.
let _groupedCache = null;
let _groupedCacheKey = null;

function groupClockings(clockings) {
    const cacheKey = clockings.length + '|' + (state.lastUpdated?.getTime() || 0);
    if (_groupedCache && _groupedCacheKey === cacheKey) return _groupedCache;

    const byEmp = new Map();
    for (const entry of clockings) {
        // Skip soft-deleted entries (admin deletions add { deleted: true })
        if (entry.deleted) continue;
        const entryDate = localDateStr(new Date(entry.timestamp));
        if (!byEmp.has(entry.employeeId)) byEmp.set(entry.employeeId, new Map());
        const days = byEmp.get(entry.employeeId);
        if (!days.has(entryDate)) days.set(entryDate, []);
        days.get(entryDate).push(entry);
    }
    // Sort each day's entries chronologically
    for (const days of byEmp.values()) {
        for (const arr of days.values()) {
            arr.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }
    }

    _groupedCache = byEmp;
    _groupedCacheKey = cacheKey;
    return byEmp;
}

// Compute current live status for today
function computeLiveStatus(todayEntries, todayStr) {
    if (!todayEntries || todayEntries.length === 0) {
        // Only "absent" if it's a non-weekend; otherwise "out" by default
        return { state: isWeekend(todayStr) ? 'out' : 'absent', since: null };
    }
    if (todayEntries.some(e => e.type === 'Sick Day')) {
        return { state: 'sick', since: null };
    }
    const last = todayEntries[todayEntries.length - 1];
    const lastTime = new Date(last.timestamp);
    switch (last.type) {
        case 'Clock In':
        case 'Break End':
        case 'Lunch End':
            return { state: 'working', since: lastTime };
        case 'Break Start':
            return { state: 'break', since: lastTime };
        case 'Lunch Start':
            return { state: 'lunch', since: lastTime };
        case 'Clock Out':
            return { state: 'out', since: lastTime };
        default:
            return { state: 'out', since: lastTime };
    }
}

// Compute day stats for a single employee-day
function computeDayStats(entries, dateStr, isToday = false) {
    if (!entries || entries.length === 0) {
        return {
            isSick: false, isAbsent: !isWeekend(dateStr) && !isToday,
            isWeekend: isWeekend(dateStr),
            clockIn: null, clockOut: null,
            attendanceMs: 0, breakMs: 0, workedMs: 0,
            segments: [],
        };
    }
    if (entries.some(e => e.type === 'Sick Day')) {
        return {
            isSick: true, isAbsent: false, isWeekend: isWeekend(dateStr),
            clockIn: null, clockOut: null,
            attendanceMs: 0, breakMs: 0, workedMs: 0,
            segments: [{ type: 'sick', start: 0, end: 1 }],
        };
    }

    let clockIn = null, clockOut = null;
    for (const e of entries) {
        if (e.type === 'Clock In' && !clockIn) clockIn = new Date(e.timestamp);
    }
    for (let i = entries.length - 1; i >= 0; i--) {
        if (entries[i].type === 'Clock Out') { clockOut = new Date(entries[i].timestamp); break; }
    }

    // Build state segments across the day
    const segs = [];
    let curState = 'out';
    let curStart = null;

    const pushSeg = (endTime) => {
        if (curStart && curState !== 'out' && endTime > curStart) {
            segs.push({ type: curState, startTime: curStart, endTime });
        }
    };

    for (const e of entries) {
        const t = new Date(e.timestamp);
        switch (e.type) {
            case 'Clock In':
                pushSeg(t);
                curState = 'working'; curStart = t; break;
            case 'Break Start':
                pushSeg(t);
                curState = 'break'; curStart = t; break;
            case 'Lunch Start':
                pushSeg(t);
                curState = 'lunch'; curStart = t; break;
            case 'Break End':
            case 'Lunch End':
                pushSeg(t);
                curState = 'working'; curStart = t; break;
            case 'Clock Out':
                pushSeg(t);
                curState = 'out'; curStart = t; break;
        }
    }

    // Close out remaining segment
    if (curStart && curState !== 'out') {
        const endTime = isToday ? new Date() : (clockOut || new Date(entries[entries.length - 1].timestamp));
        if (endTime > curStart) {
            const seg = { type: curState, startTime: curStart, endTime };
            if (isToday) seg.isLive = true;
            segs.push(seg);
        }
    }

    // Totals
    let workedMs = 0, breakMs = 0;
    for (const s of segs) {
        const d = s.endTime - s.startTime;
        if (s.type === 'working') workedMs += d;
        else if (s.type === 'break' || s.type === 'lunch') breakMs += d;
    }
    const attendanceStart = clockIn;
    const attendanceEnd = clockOut || (isToday && segs.length > 0 ? new Date() : null);
    const attendanceMs = (attendanceStart && attendanceEnd) ? (attendanceEnd - attendanceStart) : (workedMs + breakMs);

    return {
        isSick: false, isAbsent: false, isWeekend: isWeekend(dateStr),
        clockIn, clockOut,
        attendanceMs, breakMs, workedMs,
        segments: segs,
    };
}

// Compute period totals for an employee across multiple days
function computePeriodStats(empDays, dateRange, todayStr) {
    let totalWorked = 0, totalBreak = 0;
    let workingDays = 0, presentDays = 0, sickDays = 0, absentDays = 0;
    let clockInTimes = [];
    let dailyHours = [];
    let dailyStats = {};

    for (const dateStr of dateRange) {
        const entries = empDays.get(dateStr) || [];
        const isToday = dateStr === todayStr;
        const stats = computeDayStats(entries, dateStr, isToday);
        dailyStats[dateStr] = stats;

        const wkend = stats.isWeekend;

        if (stats.isSick) {
            sickDays++;
        } else if (entries.length === 0) {
            if (!wkend && !isToday) absentDays++;
        } else {
            if (stats.clockIn) {
                const hr = stats.clockIn.getHours() + stats.clockIn.getMinutes() / 60;
                clockInTimes.push(hr);
            }
            presentDays++;
            totalWorked += stats.workedMs;
            totalBreak += stats.breakMs;
        }

        if (!wkend) workingDays++;
        dailyHours.push({ date: dateStr, hours: stats.workedMs / 3600000, isWeekend: wkend, isSick: stats.isSick, isAbsent: !stats.isSick && entries.length === 0 && !isToday && !wkend });
    }

    const avgClockIn = clockInTimes.length ? clockInTimes.reduce((a, b) => a + b, 0) / clockInTimes.length : null;
    const latestClockIn = clockInTimes.length ? Math.max(...clockInTimes) : null;
    const earliestClockIn = clockInTimes.length ? Math.min(...clockInTimes) : null;
    const avgDailyMs = presentDays > 0 ? totalWorked / presentDays : 0;
    const avgBreakMs = presentDays > 0 ? totalBreak / presentDays : 0;
    const attendancePct = workingDays > 0 ? Math.round((presentDays / workingDays) * 100) : 0;

    return {
        totalWorked, totalBreak,
        workingDays, presentDays, sickDays, absentDays,
        avgClockIn, latestClockIn, earliestClockIn,
        avgDailyMs, avgBreakMs, attendancePct,
        dailyHours, dailyStats,
    };
}

// Convert hour (e.g. 8.5) to "08:30"
function hourToClock(hr) {
    if (hr == null) return '—';
    const h = Math.floor(hr);
    const m = Math.round((hr - h) * 60);
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

// Segment x/width on a 0–100 scale spanning WORKDAY_START_HOUR–WORKDAY_END_HOUR
function segPosition(date, dateStr) {
    const dayStart = startOfDay(dateStr);
    dayStart.setHours(WORKDAY_START_HOUR, 0, 0, 0);
    const dayEnd = startOfDay(dateStr);
    dayEnd.setHours(WORKDAY_END_HOUR, 0, 0, 0);
    const total = dayEnd - dayStart;
    const offset = Math.max(0, Math.min(total, date - dayStart));
    return (offset / total) * 100;
}

// ════════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════════
function buildEmployeeStats() {
    const todayStr = localDateStr();
    const grouped = groupClockings(state.clockings);
    const { startDate, endDate } = state.filters;
    const dateRange = (startDate && endDate) ? daysBetween(startDate, endDate) : [];
    if (!dateRange.includes(todayStr)) {
        // For live status we always need today's data even outside selected range
        dateRange.push(todayStr);
        dateRange.sort();
    }

    const out = [];
    for (const emp of state.employees) {
        const empDays = grouped.get(emp.id) || new Map();
        const todayEntries = empDays.get(todayStr) || [];
        const live = computeLiveStatus(todayEntries, todayStr);
        const periodStats = (startDate && endDate)
            ? computePeriodStats(empDays, daysBetween(startDate, endDate), todayStr)
            : null;
        const todayStats = computeDayStats(todayEntries, todayStr, true);
        out.push({ employee: emp, live, periodStats, todayStats, empDays });
    }
    return { employeeStats: out, todayStr };
}

function applyFiltersAndSort(employeeStats) {
    const { department, status, sortBy, search } = state.filters;
    let arr = employeeStats.slice();

    if (department !== 'all') arr = arr.filter(e => e.employee.department === department);
    if (status !== 'all')     arr = arr.filter(e => e.live.state === status);
    if (search.trim()) {
        const q = search.trim().toLowerCase();
        arr = arr.filter(e => e.employee.name.toLowerCase().includes(q) ||
                              (e.employee.department || '').toLowerCase().includes(q));
    }

    const statusOrder = { working: 0, break: 1, lunch: 2, out: 3, absent: 4, sick: 5 };
    arr.sort((a, b) => {
        switch (sortBy) {
            case 'name':       return a.employee.name.localeCompare(b.employee.name);
            case 'dept':       return (a.employee.department || '').localeCompare(b.employee.department || '') ||
                                       a.employee.name.localeCompare(b.employee.name);
            case 'hours':      return (b.periodStats?.totalWorked || 0) - (a.periodStats?.totalWorked || 0);
            case 'attendance': return (b.periodStats?.attendancePct || 0) - (a.periodStats?.attendancePct || 0);
            case 'status':
            default:           return (statusOrder[a.live.state] ?? 9) - (statusOrder[b.live.state] ?? 9) ||
                                       a.employee.name.localeCompare(b.employee.name);
        }
    });
    return arr;
}

function renderKpis(employeeStats) {
    const counts = { working: 0, break: 0, lunch: 0, out: 0, absent: 0, sick: 0 };
    for (const e of employeeStats) counts[e.live.state] = (counts[e.live.state] || 0) + 1;
    const total = state.employees.length;
    const breakAndLunch = counts.break + counts.lunch;
    const absentAndSick = counts.absent + counts.sick;

    document.getElementById('kpi-working').textContent = counts.working;
    document.getElementById('kpi-working-meta').innerHTML = `<strong>${total}</strong> total employees`;
    document.getElementById('kpi-break').textContent = breakAndLunch;
    document.getElementById('kpi-break-meta').innerHTML = `<strong>${counts.break}</strong> break · <strong>${counts.lunch}</strong> lunch`;
    document.getElementById('kpi-out').textContent = counts.out;
    document.getElementById('kpi-out-meta').innerHTML = `not currently in`;
    document.getElementById('kpi-absent').textContent = absentAndSick;
    document.getElementById('kpi-absent-meta').innerHTML = `<strong>${counts.absent}</strong> absent · <strong>${counts.sick}</strong> sick`;
}

// Builds the small 7-day timeline strip (today + 6 days back) for a row
function renderInlineTimeline(empDays, todayStr) {
    // Days = last 7 days inclusive of today, oldest → newest
    const days = [];
    const cur = startOfDay(todayStr);
    cur.setDate(cur.getDate() - 6);
    for (let i = 0; i < 7; i++) {
        days.push(localDateStr(cur));
        cur.setDate(cur.getDate() + 1);
    }

    return `<div class="day-strips">${days.map(dateStr => {
        const entries = empDays.get(dateStr) || [];
        const isToday = dateStr === todayStr;
        const stats = computeDayStats(entries, dateStr, isToday);
        const lbl = dayLabel(dateStr);

        let segmentsHtml = '';
        if (stats.isSick) {
            segmentsHtml = `<div class="seg seg-sick" style="left:0;width:100%"></div>`;
        } else if (entries.length === 0 && !stats.isWeekend && !isToday) {
            // absent
            segmentsHtml = `<div class="seg seg-absent-day" style="left:0;width:100%"></div>`;
        } else {
            for (const s of stats.segments) {
                const x = segPosition(s.startTime, dateStr);
                const w = segPosition(s.endTime, dateStr) - x;
                if (w <= 0) continue;
                const cls = s.isLive ? 'seg-live' : `seg-${s.type}`;
                segmentsHtml += `<div class="seg ${cls}" style="left:${x}%;width:${w}%"></div>`;
            }
        }

        const tooltipData = (stats.isSick) ? 'Sick day'
            : (entries.length === 0) ? (stats.isWeekend ? 'Weekend' : (isToday ? 'No clockings yet' : 'Absent'))
            : `In ${fmtTimeOfDay(stats.clockIn)} · ${fmtDurationCompact(stats.workedMs)} worked${stats.clockOut ? ' · Out ' + fmtTimeOfDay(stats.clockOut) : ' · still in'}`;

        return `
            <div class="day-strip ${isToday ? 'today' : ''}"
                 data-tip="${fullDateLabel(dateStr)}|${tooltipData}">
                <div class="day-strip-bar">${segmentsHtml}</div>
                <div class="day-strip-label">
                    ${lbl.wk}
                    <span class="day-num">${lbl.day}</span>
                </div>
            </div>`;
    }).join('')}</div>`;
}

function renderEmployeeRow({ employee, live, periodStats, todayStats, empDays }, todayStr) {
    const c = colorOf(employee.id);
    const statusLabel = STATUS_LABELS[live.state] || '—';
    const since = live.since ? fmtTimeOfDay(live.since) : '—';

    const todayLine = (() => {
        if (live.state === 'sick') return { v: 'Sick day', s: '' };
        if (live.state === 'absent') return { v: 'Not in', s: '' };
        if (todayStats.clockIn) {
            return {
                v: fmtDurationCompact(todayStats.workedMs),
                s: `in ${fmtTimeOfDay(todayStats.clockIn)}${todayStats.breakMs > 0 ? ' · ' + fmtDurationCompact(todayStats.breakMs) + ' break' : ''}`
            };
        }
        return { v: '—', s: '' };
    })();

    const weekLine = periodStats ? {
        v: fmtDurationCompact(periodStats.totalWorked),
        s: `${periodStats.attendancePct}% attendance`
    } : { v: '—', s: '' };

    return `
        <div class="row" data-empid="${employee.id}">
            <div class="cell-employee">
                <div class="avatar" data-color="${c}">${initials(employee.name)}</div>
                <div class="employee-info">
                    <div class="employee-name">${employee.name}</div>
                    <div class="employee-dept">${employee.department || '—'}</div>
                </div>
            </div>

            <div>
                <span class="status-pill" data-state="${live.state}">
                    <span class="pill-dot"></span>${statusLabel}
                </span>
                ${live.since ? `<div class="stat-sub mono" style="margin-top:4px">since ${since}</div>` : ''}
            </div>

            <div class="stat">
                <div class="stat-label">Today</div>
                <div class="stat-value">${todayLine.v}</div>
                <div class="stat-sub">${todayLine.s || '&nbsp;'}</div>
            </div>

            <div class="stat col-week">
                <div class="stat-label">Period</div>
                <div class="stat-value">${weekLine.v}</div>
                <div class="stat-sub">${weekLine.s || '&nbsp;'}</div>
            </div>

            <div class="cell-timeline">
                ${renderInlineTimeline(empDays, todayStr)}
            </div>

            <div class="chevron">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
        </div>
    `;
}

function renderRows() {
    const { employeeStats, todayStr } = buildEmployeeStats();
    const visible = applyFiltersAndSort(employeeStats);

    renderKpis(employeeStats); // KPIs reflect the WHOLE workforce, not filtered

    const rowsEl = document.getElementById('employeeRows');
    if (visible.length === 0) {
        rowsEl.innerHTML = `<div class="empty"><div class="empty-icon">∅</div><div>No employees match the current filters.</div></div>`;
    } else {
        rowsEl.innerHTML = visible.map(e => renderEmployeeRow(e, todayStr)).join('');
    }

    document.getElementById('employeeCount').textContent =
        `${visible.length} of ${employeeStats.length} employees`;

    if (state.lastUpdated) {
        document.getElementById('lastUpdated').textContent =
            state.lastUpdated.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    // Bind row clicks
    rowsEl.querySelectorAll('.row').forEach(row => {
        row.addEventListener('click', () => openDrawer(row.dataset.empid));
    });

    // Bind tooltips on day strips
    rowsEl.querySelectorAll('.day-strip').forEach(strip => {
        strip.addEventListener('mouseenter', showTip);
        strip.addEventListener('mouseleave', hideTip);
        strip.addEventListener('mousemove', moveTip);
    });
}

// ════════════════════════════════════════════════════════════════════════
// TOOLTIP
// ════════════════════════════════════════════════════════════════════════
const tipEl = document.getElementById('tooltip');
function showTip(e) {
    const data = e.currentTarget.dataset.tip;
    if (!data) return;
    const [date, info] = data.split('|');
    tipEl.innerHTML = `<div class="tt-label">${date}</div><div>${info}</div>`;
    tipEl.classList.add('show');
    moveTip(e);
}
function moveTip(e) {
    tipEl.style.left = e.clientX + 'px';
    tipEl.style.top = e.clientY + 'px';
}
function hideTip() { tipEl.classList.remove('show'); }

// ════════════════════════════════════════════════════════════════════════
// EVALUATION DRAWER
// ════════════════════════════════════════════════════════════════════════
function openDrawer(empId) {
    state.selectedEmployeeId = empId;
    document.querySelectorAll('.row').forEach(r => r.classList.toggle('selected', r.dataset.empid === empId));
    renderDrawer();
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
    state.selectedEmployeeId = null;
    document.querySelectorAll('.row').forEach(r => r.classList.remove('selected'));
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
}

document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

function renderDrawer() {
    const empId = state.selectedEmployeeId;
    if (!empId) return;
    const emp = state.employees.find(e => String(e.id) === String(empId));
    if (!emp) return;

    const todayStr = localDateStr();
    const empDaysAll = groupClockings(state.clockings).get(emp.id) || new Map();
    const { startDate, endDate } = state.filters;
    const dateRange = daysBetween(startDate, endDate);
    const periodStats = computePeriodStats(empDaysAll, dateRange, todayStr);
    const todayStats = computeDayStats(empDaysAll.get(todayStr) || [], todayStr, true);
    const live = computeLiveStatus(empDaysAll.get(todayStr) || [], todayStr);

    const c = colorOf(emp.id);
    const dailyHours = periodStats.dailyHours;
    const maxHours = Math.max(8, ...dailyHours.map(d => d.hours));

    // Bar chart cols (one per day in range)
    const chart = dailyHours.map(d => {
        const pct = (d.hours / maxHours) * 100;
        let kind = 'work';
        if (d.isSick) kind = 'sick';
        else if (d.isAbsent) kind = 'absent';
        else if (d.isWeekend && d.hours === 0) kind = 'weekend';

        const lbl = dayLabel(d.date);
        const tooltip = d.isSick ? 'Sick day'
            : d.isAbsent ? 'Absent'
            : d.isWeekend && d.hours === 0 ? 'Weekend'
            : `${d.hours.toFixed(2)}h`;

        return `<div class="bar-col" title="${fullDateLabel(d.date)} — ${tooltip}">
            <span class="bar-value">${tooltip}</span>
            <div class="bar-fill" data-kind="${kind}" style="height: ${Math.max(2, pct)}%"></div>
            <div class="bar-label">${lbl.day}</div>
        </div>`;
    }).join('');

    // Daily detail rows
    const dayRows = dateRange.map(dateStr => {
        const stats = periodStats.dailyStats[dateStr];
        const entries = empDaysAll.get(dateStr) || [];
        const isToday = dateStr === todayStr;
        const lbl = dayLabel(dateStr);

        let segmentsHtml = '';
        let summaryHtml = '';
        let stateAttr = '';

        if (stats.isSick) {
            segmentsHtml = `<div class="seg seg-sick" style="left:0;width:100%"></div>`;
            summaryHtml = `<span class="day-status">Sick day</span>`;
            stateAttr = 'sick';
        } else if (entries.length === 0) {
            if (stats.isWeekend) {
                summaryHtml = `<span class="day-status">Weekend</span>`;
            } else if (isToday) {
                summaryHtml = `<span class="day-status">No clockings yet</span>`;
            } else {
                segmentsHtml = `<div class="seg seg-absent-day" style="left:0;width:100%"></div>`;
                summaryHtml = `<span class="day-status">Absent</span>`;
                stateAttr = 'absent';
            }
        } else {
            for (const s of stats.segments) {
                const x = segPosition(s.startTime, dateStr);
                const w = segPosition(s.endTime, dateStr) - x;
                if (w <= 0) continue;
                const cls = s.isLive ? 'seg-live' : `seg-${s.type}`;
                segmentsHtml += `<div class="seg ${cls}" style="left:${x}%;width:${w}%"></div>`;
            }
            summaryHtml = `${fmtTimeOfDay(stats.clockIn)}–${stats.clockOut ? fmtTimeOfDay(stats.clockOut) : 'live'} · <strong>${fmtDurationCompact(stats.workedMs)}</strong>`;
        }

        return `<div class="day-row" data-state="${stateAttr}">
            <div class="day-date">${lbl.wk}<span class="day-num">${lbl.day} ${startOfDay(dateStr).toLocaleDateString('en-GB', {month: 'short'})}</span></div>
            <div class="day-bar">${segmentsHtml}</div>
            <div class="day-summary">${summaryHtml}</div>
        </div>`;
    }).join('');

    // Activity log: last 20 events (excluding soft-deleted)
    const allEvents = [];
    for (const arr of empDaysAll.values()) allEvents.push(...arr);
    const visibleEvents = allEvents.filter(e => !e.deleted);
    visibleEvents.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    const recentEvents = visibleEvents.slice(0, 20);
    const activityHtml = recentEvents.map(ev => {
        const t = new Date(ev.timestamp);
        return `<div class="activity-item" data-entry-id="${ev.id}">
            <div class="time">${t.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
            <div class="event"><span class="event-tag" data-type="${ev.type}">${ev.type}</span></div>
            <div class="activity-actions">
                <button class="icon-btn" data-action="edit-clk" data-entry-id="${ev.id}" aria-label="Edit clocking" title="Edit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="icon-btn danger" data-action="delete-clk" data-entry-id="${ev.id}" aria-label="Delete clocking" title="Delete">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                </button>
            </div>
        </div>`;
    }).join('') || '<div class="empty"><div>No activity recorded.</div></div>';

    // Notes
    const notesKey = `ks-tk-notes-${emp.id}`;
    const savedNotes = localStorage.getItem(notesKey) || '';
    const notesTs = localStorage.getItem(`${notesKey}-ts`);

    document.getElementById('drawerContent').innerHTML = `
        <div class="drawer-header">
            <div class="avatar" data-color="${c}">${initials(emp.name)}</div>
            <div class="drawer-title">
                <div class="name">${emp.name}</div>
                <div class="dept">${emp.department || '—'} · ID ${emp.id}</div>
                <div class="live">
                    <span class="status-pill" data-state="${live.state}">
                        <span class="pill-dot"></span>${STATUS_LABELS[live.state]}
                    </span>
                    ${live.since ? `<span class="stat-sub mono">since ${fmtTimeOfDay(live.since)}</span>` : ''}
                </div>
            </div>
            <button class="drawer-close" id="drawerCloseBtn" aria-label="Close">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="drawer-body">
            <!-- Period metrics -->
            <div class="drawer-section">
                <h3>Period overview <span class="h3-meta">${fullDateLabel(startDate)} – ${fullDateLabel(endDate)}</span></h3>
                <div class="metric-grid">
                    <div class="metric">
                        <div class="metric-label">Hours worked</div>
                        <div class="metric-value">${fmtDurationCompact(periodStats.totalWorked)}</div>
                        <div class="metric-meta">avg ${fmtDurationCompact(periodStats.avgDailyMs)}/day</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Attendance</div>
                        <div class="metric-value">${periodStats.attendancePct}%</div>
                        <div class="metric-meta">${periodStats.presentDays} / ${periodStats.workingDays} working days</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Avg clock-in</div>
                        <div class="metric-value">${hourToClock(periodStats.avgClockIn)}</div>
                        <div class="metric-meta">latest ${hourToClock(periodStats.latestClockIn)} · earliest ${hourToClock(periodStats.earliestClockIn)}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Break time</div>
                        <div class="metric-value">${fmtDurationCompact(periodStats.totalBreak)}</div>
                        <div class="metric-meta">avg ${fmtDurationCompact(periodStats.avgBreakMs)}/day</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Sick days</div>
                        <div class="metric-value">${periodStats.sickDays}</div>
                        <div class="metric-meta">${periodStats.sickDays > 0 ? Math.round((periodStats.sickDays / periodStats.workingDays) * 100) + '% of working days' : 'none in period'}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Absent days</div>
                        <div class="metric-value">${periodStats.absentDays}</div>
                        <div class="metric-meta">unaccounted absences</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Today</div>
                        <div class="metric-value">${fmtDurationCompact(todayStats.workedMs)}</div>
                        <div class="metric-meta">${todayStats.clockIn ? 'in ' + fmtTimeOfDay(todayStats.clockIn) : '—'}</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Break today</div>
                        <div class="metric-value">${fmtDurationCompact(todayStats.breakMs)}</div>
                        <div class="metric-meta">&nbsp;</div>
                    </div>
                </div>
            </div>

            <!-- Daily hours bar chart -->
            <div class="drawer-section">
                <h3>Daily hours <span class="h3-meta">${dailyHours.length} days</span></h3>
                <div class="bar-chart">
                    <div class="grid-line" style="top: 25%"></div>
                    <div class="grid-line" style="top: 50%"></div>
                    <div class="grid-line" style="top: 75%"></div>
                    ${chart}
                </div>
            </div>

            <!-- Day-by-day timeline -->
            <div class="drawer-section">
                <h3>Day-by-day <span class="h3-meta">7am – 7pm</span></h3>
                <div class="day-detail">${dayRows}</div>
            </div>

            <!-- Recent activity -->
            <div class="drawer-section">
                <div class="section-head-row">
                    <h3>Recent activity <span class="h3-meta">last 20 events</span></h3>
                    <button class="btn btn-primary btn-sm" id="addClockingBtn">
                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                        Add clocking
                    </button>
                </div>
                <div class="activity-log">${activityHtml}</div>
            </div>

            <!-- Notes -->
            <div class="drawer-section">
                <h3>Evaluation notes <span class="h3-meta">saved to this browser</span></h3>
                <textarea class="notes-area" id="evalNotes" placeholder="Add notes for performance review — punctuality, reliability, observations…">${savedNotes}</textarea>
                <div class="notes-meta">
                    <span id="notesSaveStatus">${notesTs ? 'Last saved ' + new Date(parseInt(notesTs, 10)).toLocaleString('en-GB') : 'Not yet saved'}</span>
                    <span><kbd class="mono">⌘S</kbd> or autosave</span>
                </div>
            </div>

            <!-- Actions -->
            <div class="drawer-actions">
                <button class="btn" id="exportEmployeeBtn">Export employee CSV</button>
                <button class="btn" id="printEvalBtn">Print summary</button>
            </div>
        </div>
    `;

    document.getElementById('drawerCloseBtn').addEventListener('click', closeDrawer);
    const notesEl = document.getElementById('evalNotes');
    let saveTimer;
    notesEl.addEventListener('input', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            localStorage.setItem(notesKey, notesEl.value);
            localStorage.setItem(`${notesKey}-ts`, Date.now().toString());
            document.getElementById('notesSaveStatus').textContent = 'Saved ' + new Date().toLocaleTimeString('en-GB');
        }, 600);
    });
    document.getElementById('exportEmployeeBtn').addEventListener('click', () => exportCSV(emp.id));
    document.getElementById('printEvalBtn').addEventListener('click', () => window.print());

    // Admin: add clocking button
    document.getElementById('addClockingBtn').addEventListener('click', () => openClockingForm(emp.id));

    // Admin: edit/delete on each activity item
    document.querySelectorAll('#drawerContent [data-action="edit-clk"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const entryId = btn.dataset.entryId;
            const entry = state.clockings.find(c => c.id === entryId);
            if (entry) openClockingForm(emp.id, entry);
        });
    });
    document.querySelectorAll('#drawerContent [data-action="delete-clk"]').forEach(btn => {
        btn.addEventListener('click', () => {
            const entryId = btn.dataset.entryId;
            const entry = state.clockings.find(c => c.id === entryId);
            if (entry) confirmDeleteClocking(entry);
        });
    });
}

// CSV EXPORT
// ════════════════════════════════════════════════════════════════════════
function exportCSV(filterEmpId = null) {
    const todayStr = localDateStr();
    const { startDate, endDate } = state.filters;
    const dateRange = daysBetween(startDate, endDate);
    const grouped = groupClockings(state.clockings);

    const rows = [];
    rows.push(['Kerr & Smith Time Keeper Report']);
    rows.push([`Date range: ${fullDateLabel(startDate)} to ${fullDateLabel(endDate)}`]);
    rows.push([`Generated: ${new Date().toLocaleString('en-GB')}`]);
    rows.push([]);
    rows.push(['Employee', 'Department', 'Date', 'Status', 'Clock In', 'Tea Break Start', 'Tea Break End', 'Total Tea', 'Lunch Start', 'Lunch End', 'Total Lunch', 'Clock Out', 'Worked', 'Attendance']);

    const employees = filterEmpId ? state.employees.filter(e => String(e.id) === String(filterEmpId)) : state.employees;

    for (const emp of employees) {
        const empDays = grouped.get(emp.id) || new Map();
        rows.push([]);
        rows.push([`${emp.name} — ${emp.department || ''}`]);

        let empWorked = 0, empAttend = 0, empBreak = 0;

        for (const dateStr of dateRange) {
            const entries = empDays.get(dateStr) || [];
            const stats = computeDayStats(entries, dateStr, dateStr === todayStr);
            const lbl = fullDateLabel(dateStr);

            let status = 'OK';
            if (stats.isSick) status = 'SICK';
            else if (entries.length === 0) {
                if (stats.isWeekend) status = 'WEEKEND';
                else if (dateStr === todayStr) status = 'PENDING';
                else status = 'ABSENT';
            }

            // First break/lunch pair times
            const breakStart = entries.find(e => e.type === 'Break Start');
            const breakEnd   = entries.find(e => e.type === 'Break End');
            const lunchStart = entries.find(e => e.type === 'Lunch Start');
            const lunchEnd   = entries.find(e => e.type === 'Lunch End');

            const teaMs = (breakStart && breakEnd) ? (new Date(breakEnd.timestamp) - new Date(breakStart.timestamp)) : 0;
            const lunMs = (lunchStart && lunchEnd) ? (new Date(lunchEnd.timestamp) - new Date(lunchStart.timestamp)) : 0;

            rows.push([
                emp.name,
                emp.department || '',
                lbl,
                status,
                fmtTimeOfDay(stats.clockIn),
                breakStart ? fmtTimeOfDay(new Date(breakStart.timestamp)) : '',
                breakEnd ? fmtTimeOfDay(new Date(breakEnd.timestamp)) : '',
                teaMs > 0 ? fmtDurationCompact(teaMs) : '',
                lunchStart ? fmtTimeOfDay(new Date(lunchStart.timestamp)) : '',
                lunchEnd ? fmtTimeOfDay(new Date(lunchEnd.timestamp)) : '',
                lunMs > 0 ? fmtDurationCompact(lunMs) : '',
                fmtTimeOfDay(stats.clockOut),
                stats.workedMs > 0 ? fmtDurationCompact(stats.workedMs) : '',
                stats.attendanceMs > 0 ? fmtDurationCompact(stats.attendanceMs) : '',
            ]);

            empWorked += stats.workedMs;
            empAttend += stats.attendanceMs;
            empBreak += stats.breakMs;
        }

        rows.push(['', '', '', 'TOTALS', '', '', '', '', '', '', '', '', fmtDurationCompact(empWorked), fmtDurationCompact(empAttend)]);
    }

    // CSV escape
    const csv = rows.map(r => r.map(cell => {
        const s = String(cell ?? '');
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')).join('\n');

    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const fname = filterEmpId
        ? `TimeKeeper_${(employees[0]?.name || 'employee').replace(/\s+/g, '_')}_${startDate}_to_${endDate}.csv`
        : `TimeKeeper_${startDate}_to_${endDate}.csv`;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════════════════════════
// DATE RANGE PICKER
// ════════════════════════════════════════════════════════════════════════
const picker = {
    isOpen: false,
    viewMonth: new Date(),  // first day of month being shown
    tempStart: null,        // Date during selection
    tempEnd: null,
    hoverDate: null,        // Date currently hovered (for range preview)
    picking: null,          // 'start' | 'end' | null — which slot we're filling
    lastTapTime: 0,         // debounce protection against rapid duplicate fires
};

const DOW_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

function formatRangeLabel(startStr, endStr) {
    if (!startStr || !endStr) return '—';
    const s = startOfDay(startStr);
    const e = startOfDay(endStr);
    const sameDay = startStr === endStr;
    const sameMonth = s.getFullYear() === e.getFullYear() && s.getMonth() === e.getMonth();
    const sameYear = s.getFullYear() === e.getFullYear();
    const now = new Date();
    const thisYear = now.getFullYear();

    const fmt = (d, withYear = false, withMonth = true) => {
        const opts = { day: 'numeric' };
        if (withMonth) opts.month = 'short';
        if (withYear) opts.year = 'numeric';
        return d.toLocaleDateString('en-GB', opts);
    };

    if (sameDay) {
        const today = localDateStr();
        const yesterday = localDateStr(new Date(Date.now() - 86400000));
        if (startStr === today) return `Today · ${fmt(s, false)}`;
        if (startStr === yesterday) return `Yesterday · ${fmt(s, false)}`;
        return fmt(s, s.getFullYear() !== thisYear);
    }
    if (sameMonth) {
        return `${fmt(s, false, false)} – ${fmt(e, s.getFullYear() !== thisYear)}`;
    }
    if (sameYear) {
        return `${fmt(s, false)} – ${fmt(e, s.getFullYear() !== thisYear)}`;
    }
    return `${fmt(s, true)} – ${fmt(e, true)}`;
}

function updateRangeLabel() {
    document.getElementById('rangeLabel').textContent =
        formatRangeLabel(state.filters.startDate, state.filters.endDate);
    highlightActivePreset();
}

// Identify which preset (if any) matches the current range
function matchPreset(startStr, endStr) {
    const today = new Date();
    const tStr = localDateStr(today);

    const ymd = (d) => localDateStr(d);
    const addDays = (d, n) => {
        const r = new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
        return r;
    };

    // Today
    if (startStr === tStr && endStr === tStr) return 'today';
    // Yesterday
    const y = addDays(today, -1);
    if (startStr === ymd(y) && endStr === ymd(y)) return 'yesterday';
    // Last N days (ending today)
    if (endStr === tStr) {
        if (startStr === ymd(addDays(today, -6))) return 'last7';
        if (startStr === ymd(addDays(today, -13))) return 'last14';
        if (startStr === ymd(addDays(today, -29))) return 'last30';
    }
    // This week (Mon → today)
    const dow = today.getDay() || 7; // 1..7, Mon=1
    const monday = addDays(today, -(dow - 1));
    if (startStr === ymd(monday) && endStr === tStr) return 'this-week';
    // Last week (prev Mon → prev Sun)
    const lastMon = addDays(monday, -7);
    const lastSun = addDays(monday, -1);
    if (startStr === ymd(lastMon) && endStr === ymd(lastSun)) return 'last-week';
    // This month
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    if (startStr === ymd(monthStart) && endStr === tStr) return 'this-month';
    // Last month
    const lastMonthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const lastMonthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
    if (startStr === ymd(lastMonthStart) && endStr === ymd(lastMonthEnd)) return 'last-month';

    return null;
}

function highlightActivePreset() {
    const active = matchPreset(state.filters.startDate, state.filters.endDate);
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.preset === active);
    });
}

function presetToRange(preset) {
    const today = new Date();
    const addDays = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
    switch (preset) {
        case 'today':      return { start: today, end: today };
        case 'yesterday':  { const y = addDays(today, -1); return { start: y, end: y }; }
        case 'last7':      return { start: addDays(today, -6),  end: today };
        case 'last14':     return { start: addDays(today, -13), end: today };
        case 'last30':     return { start: addDays(today, -29), end: today };
        case 'this-week': {
            const dow = today.getDay() || 7;
            return { start: addDays(today, -(dow - 1)), end: today };
        }
        case 'last-week': {
            const dow = today.getDay() || 7;
            const lastMon = addDays(today, -(dow - 1) - 7);
            const lastSun = addDays(lastMon, 6);
            return { start: lastMon, end: lastSun };
        }
        case 'this-month':
            return { start: new Date(today.getFullYear(), today.getMonth(), 1), end: today };
        case 'last-month':
            return {
                start: new Date(today.getFullYear(), today.getMonth() - 1, 1),
                end:   new Date(today.getFullYear(), today.getMonth(), 0),
            };
    }
    return null;
}

function applyRange(startStr, endStr) {
    state.filters.startDate = startStr;
    state.filters.endDate = endStr;
    updateRangeLabel();
    renderRows();
    if (state.selectedEmployeeId) renderDrawer();
}

function openPicker() {
    picker.isOpen = true;
    picker.tempStart = startOfDay(state.filters.startDate);
    picker.tempEnd = startOfDay(state.filters.endDate);
    picker.hoverDate = null;
    picker.picking = null;  // both already set; chip taps switch us to a specific mode
    // Show the end date's month by default
    picker.viewMonth = new Date(picker.tempEnd.getFullYear(), picker.tempEnd.getMonth(), 1);
    renderCalendar();
    document.getElementById('rangePopover').classList.add('open');
    document.getElementById('rangeTrigger').classList.add('open');
    document.getElementById('rangePopover').setAttribute('aria-hidden', 'false');
}

function closePicker() {
    // Diagnostic log: tells us exactly what called closePicker if Sean still
    // sees premature closing. Look at the second line of the stack trace.
    console.log('[picker] closePicker called from:',
        (new Error().stack || '').split('\n').slice(1, 3).join(' ← '));
    picker.isOpen = false;
    document.getElementById('rangePopover').classList.remove('open');
    document.getElementById('rangeTrigger').classList.remove('open');
    document.getElementById('rangePopover').setAttribute('aria-hidden', 'true');
}

function renderCalendar() {
    const view = picker.viewMonth;
    const year = view.getFullYear();
    const month = view.getMonth();
    const today = new Date(); today.setHours(0, 0, 0, 0);

    document.getElementById('calTitle').textContent =
        view.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

    // Determine first cell: Monday-start grid
    const firstOfMonth = new Date(year, month, 1);
    const firstDow = firstOfMonth.getDay() || 7; // 1..7, Mon=1
    const gridStart = new Date(year, month, 1 - (firstDow - 1));

    // 6 weeks * 7 = 42 cells
    const grid = document.getElementById('calGrid');
    let html = DOW_LABELS.map(d => `<div class="cal-dow">${d}</div>`).join('');

    const tempStart = picker.tempStart;
    const tempEnd = picker.tempEnd;
    const hover = picker.hoverDate;

    // Determine range to highlight: tempStart/end if both, else tempStart/hover during selection
    let rangeStart = tempStart, rangeEnd = tempEnd;
    if (tempStart && !tempEnd && hover) {
        rangeStart = hover < tempStart ? hover : tempStart;
        rangeEnd   = hover < tempStart ? tempStart : hover;
    }

    for (let i = 0; i < 42; i++) {
        const d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
        const dStr = localDateStr(d);
        const isOtherMonth = d.getMonth() !== month;
        const isToday = d.getTime() === today.getTime();
        const isFuture = d > today;

        let cls = 'cal-day';
        if (isOtherMonth) cls += ' other-month';
        if (isToday) cls += ' today';
        if (isFuture) cls += ' future';

        if (rangeStart && rangeEnd) {
            const t = d.getTime();
            const sT = rangeStart.getTime();
            const eT = rangeEnd.getTime();
            if (t === sT && t === eT) cls += ' range-start range-end';
            else if (t === sT) cls += ' range-start';
            else if (t === eT) cls += ' range-end';
            else if (t > sT && t < eT) cls += ' in-range';
        } else if (tempStart) {
            if (d.getTime() === tempStart.getTime()) cls += ' range-start range-end';
        }

        html += `<div class="${cls}" data-date="${dStr}">${d.getDate()}</div>`;
    }
    grid.innerHTML = html;
    renderRangeStatus();
}

function renderRangeStatus() {
    const fromChip = document.getElementById('calFromChip');
    const toChip = document.getElementById('calToChip');
    const fromVal = document.getElementById('calFromValue');
    const toVal = document.getElementById('calToValue');

    const thisYear = new Date().getFullYear();
    const fmt = (d) => d ? d.toLocaleDateString('en-GB', {
        day: 'numeric', month: 'short',
        ...(d.getFullYear() !== thisYear ? { year: 'numeric' } : {}),
    }) : null;

    if (picker.tempStart) {
        fromVal.textContent = fmt(picker.tempStart);
        fromVal.classList.remove('placeholder');
    } else {
        fromVal.textContent = 'Tap a date';
        fromVal.classList.add('placeholder');
    }

    if (picker.tempEnd) {
        toVal.textContent = fmt(picker.tempEnd);
        toVal.classList.remove('placeholder');
    } else {
        toVal.textContent = 'Tap a date';
        toVal.classList.add('placeholder');
    }

    // Active chip = the one currently being picked (pulses to draw attention)
    fromChip.classList.toggle('active', picker.picking === 'start');
    toChip.classList.toggle('active', picker.picking === 'end');
}

function handleCellClick(cell) {
    // ── DEBOUNCE: protect against rapid duplicate fires ──
    // iOS touch can synthesise a click event sequence (touchstart → touchend →
    // mousedown → mouseup → click). On some browsers / DOM mutation patterns
    // this can effectively land twice rapidly. Ignore anything within 250ms.
    const now = Date.now();
    if (now - picker.lastTapTime < 250) {
        console.log('[picker] tap ignored (debounce)', cell.dataset.date);
        return;
    }
    picker.lastTapTime = now;

    const date = startOfDay(cell.dataset.date);
    console.log('[picker] tap', cell.dataset.date,
        'picking=', picker.picking,
        'tempStart=', picker.tempStart ? localDateStr(picker.tempStart) : 'null',
        'tempEnd=', picker.tempEnd ? localDateStr(picker.tempEnd) : 'null');

    // ── Case 1: No explicit "picking" mode — this is the user starting fresh ──
    // Clear any pre-filled range, set tapped date as start, switch to picking end.
    // Picker STAYS OPEN. They must tap a second date to complete and close.
    if (picker.picking === null) {
        picker.tempStart = date;
        picker.tempEnd = null;
        picker.picking = 'end';
        renderCalendar();
        return;
    }

    // ── Case 2: We're picking a specific slot (start or end) ──
    if (picker.picking === 'start') {
        picker.tempStart = date;
    } else {
        picker.tempEnd = date;
    }

    // If both dates now filled → complete the range (auto-swap if needed) & close
    if (picker.tempStart && picker.tempEnd) {
        let s = picker.tempStart, en = picker.tempEnd;
        if (en < s) { [s, en] = [en, s]; }
        picker.tempStart = s;
        picker.tempEnd = en;
        applyRange(localDateStr(s), localDateStr(en));
        closePicker();
        return;
    }

    // Otherwise the other slot is still empty — switch picking to it, stay open
    picker.picking = picker.tempStart ? 'end' : 'start';
    renderCalendar();
}

function handleCellHover(cell) {
    if (!picker.tempStart || picker.tempEnd) return;
    const dStr = cell.dataset.date;
    const date = startOfDay(dStr);
    if (picker.hoverDate && picker.hoverDate.getTime() === date.getTime()) return;
    picker.hoverDate = date;
    renderCalendar();
}

function bindPicker() {
    const trigger = document.getElementById('rangeTrigger');
    const popover = document.getElementById('rangePopover');
    const grid = document.getElementById('calGrid');

    trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        if (picker.isOpen) closePicker(); else openPicker();
    });

    // ── Stop ALL clicks inside the popover from bubbling to the document ──
    // First line of defence against the close-on-tap bug.
    popover.addEventListener('click', (e) => e.stopPropagation());

    // ── Calendar cell interactions via DELEGATION ──
    // (Listeners on the grid survive innerHTML re-renders. Per-cell listeners
    //  would be destroyed mid-tap on touch — mouseenter fires first, triggers
    //  re-render, removes the cell before its click fires. That ate the tap.)
    grid.addEventListener('click', (e) => {
        // Second line of defence: stop any further propagation here too.
        e.stopPropagation();
        const cell = e.target.closest('.cal-day');
        if (cell) handleCellClick(cell);
    });

    // Hover preview only on actual pointer-with-hover devices (not touch).
    const supportsHover = window.matchMedia('(hover: hover)').matches;
    if (supportsHover) {
        grid.addEventListener('pointerover', (e) => {
            if (e.pointerType === 'touch' || e.pointerType === 'pen') return;
            const cell = e.target.closest('.cal-day');
            if (cell) handleCellHover(cell);
        });
        grid.addEventListener('pointerleave', () => {
            if (picker.hoverDate) {
                picker.hoverDate = null;
                renderCalendar();
            }
        });
    }

    // ── Tappable From/To chips ──
    // Per the agreed model: tapping a chip CLEARS BOTH dates and arms the chip's
    // slot. The picker stays open and the user must tap two dates to refill both.
    document.getElementById('calFromChip').addEventListener('click', (e) => {
        e.stopPropagation();
        console.log('[picker] From chip tap');
        picker.picking = 'start';
        picker.tempStart = null;
        picker.tempEnd = null;
        picker.hoverDate = null;
        picker.lastTapTime = Date.now(); // also debounce against an immediate cell tap
        renderCalendar();
    });
    document.getElementById('calToChip').addEventListener('click', (e) => {
        e.stopPropagation();
        console.log('[picker] To chip tap');
        picker.picking = 'end';
        picker.tempStart = null;
        picker.tempEnd = null;
        picker.hoverDate = null;
        picker.lastTapTime = Date.now();
        renderCalendar();
    });

    // ── Outside-click closes (without applying) ──
    // Uses CAPTURE phase + composedPath() so the check runs BEFORE any of the
    // bubble-phase handlers (which re-render the calendar and detach cells).
    // composedPath() is computed at event dispatch and is immune to DOM mutations
    // during handlers — far more reliable than popover.contains(e.target).
    document.addEventListener('click', (e) => {
        if (!picker.isOpen) return;
        const path = typeof e.composedPath === 'function' ? e.composedPath() : [];
        for (const el of path) {
            if (el === popover || el === trigger) return; // inside picker, keep open
        }
        closePicker();
    }, true /* capture phase */);

    // ── Esc to close ──
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && picker.isOpen) closePicker();
    });

    // ── Month nav ──
    document.getElementById('calPrev').addEventListener('click', (e) => {
        e.stopPropagation();
        picker.viewMonth = new Date(picker.viewMonth.getFullYear(), picker.viewMonth.getMonth() - 1, 1);
        renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', (e) => {
        e.stopPropagation();
        picker.viewMonth = new Date(picker.viewMonth.getFullYear(), picker.viewMonth.getMonth() + 1, 1);
        renderCalendar();
    });

    // ── Presets ──
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const { start, end } = presetToRange(btn.dataset.preset);
            applyRange(localDateStr(start), localDateStr(end));
            closePicker();
        });
    });
}

// AUTH MODULE — admin PIN against Worker, bearer token in localStorage
// ════════════════════════════════════════════════════════════════════════
const auth = {
    getToken() {
        const token = localStorage.getItem(AUTH_TOKEN_KEY);
        const expires = parseInt(localStorage.getItem(AUTH_EXPIRES_KEY) || '0', 10);
        if (!token || !expires || expires < Date.now()) {
            this.clear();
            return null;
        }
        return token;
    },
    clear() {
        localStorage.removeItem(AUTH_TOKEN_KEY);
        localStorage.removeItem(AUTH_EXPIRES_KEY);
    },
    async signIn(pin) {
        const r = await fetch(`${WORKER_URL}/auth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin }),
        });
        if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.error || `HTTP ${r.status}`);
        }
        const { token, expiresAt } = await r.json();
        localStorage.setItem(AUTH_TOKEN_KEY, token);
        localStorage.setItem(AUTH_EXPIRES_KEY, String(expiresAt));
    },
    signOut() {
        this.clear();
        showPinScreen();
    },
    async api(method, path, body = null) {
        const token = this.getToken();
        if (!token) { showPinScreen(); throw new Error('Not authenticated'); }
        const headers = { 'Authorization': `Bearer ${token}` };
        if (body) headers['Content-Type'] = 'application/json';
        const r = await fetch(`${WORKER_URL}${path}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined,
        });
        if (r.status === 401) {
            this.clear();
            showPinScreen();
            throw new Error('Session expired — please sign in again');
        }
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        return data;
    },
};

// PIN SCREEN — gates dashboard access; mirrors staff PWA keypad
// ════════════════════════════════════════════════════════════════════════
const pinState = { value: '', maxLength: 4, busy: false };

function showPinScreen() {
    document.getElementById('pinScreen').classList.remove('hidden');
    pinState.value = '';
    renderPinDots();
}
function hidePinScreen() {
    document.getElementById('pinScreen').classList.add('hidden');
}
function renderPinDots() {
    const dots = document.getElementById('pinDots').querySelectorAll('.pin-dot');
    dots.forEach((d, i) => d.classList.toggle('filled', i < pinState.value.length));
}
function showPinError(msg) {
    const screen = document.getElementById('pinScreen');
    const errText = document.getElementById('pinErrorText');
    errText.textContent = msg || 'Incorrect PIN';
    screen.classList.add('error');
    setTimeout(() => {
        screen.classList.remove('error');
        pinState.value = '';
        renderPinDots();
        errText.textContent = '';
    }, 1100);
}

async function attemptPinSignIn() {
    if (pinState.busy) return;
    pinState.busy = true;
    const errText = document.getElementById('pinErrorText');
    errText.classList.add('checking');
    errText.textContent = 'Verifying…';
    try {
        await auth.signIn(pinState.value);
        errText.classList.remove('checking');
        errText.textContent = '';
        hidePinScreen();
        // After unlock, initialise the dashboard if it hasn't been already
        await ensureBooted();
    } catch (err) {
        errText.classList.remove('checking');
        showPinError(err.message);
    } finally {
        pinState.busy = false;
    }
}

function bindPinScreen() {
    document.getElementById('pinKeypad').addEventListener('click', (e) => {
        if (pinState.busy) return;
        const key = e.target.closest('.pin-key');
        if (!key || key.classList.contains('invisible')) return;
        if (key.dataset.digit) {
            if (pinState.value.length >= pinState.maxLength) return;
            pinState.value += key.dataset.digit;
            renderPinDots();
            if (pinState.value.length === pinState.maxLength) attemptPinSignIn();
        } else if (key.dataset.action === 'backspace') {
            pinState.value = pinState.value.slice(0, -1);
            renderPinDots();
        }
    });
    // Physical keyboard support
    document.addEventListener('keydown', (e) => {
        const screen = document.getElementById('pinScreen');
        if (screen.classList.contains('hidden')) return;
        if (pinState.busy) return;
        if (/^[0-9]$/.test(e.key)) {
            if (pinState.value.length >= pinState.maxLength) return;
            pinState.value += e.key;
            renderPinDots();
            if (pinState.value.length === pinState.maxLength) attemptPinSignIn();
        } else if (e.key === 'Backspace') {
            pinState.value = pinState.value.slice(0, -1);
            renderPinDots();
        } else if (e.key === 'Escape') {
            pinState.value = '';
            renderPinDots();
        }
    });
}

// MODAL UTILITY
// ════════════════════════════════════════════════════════════════════════
function openModal(html) {
    let overlay = document.getElementById('modalOverlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'modalOverlay';
        overlay.className = 'modal-overlay';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });
    }
    overlay.innerHTML = `<div class="modal" role="dialog">${html}</div>`;
    requestAnimationFrame(() => overlay.classList.add('open'));
}
function closeModal() {
    const overlay = document.getElementById('modalOverlay');
    if (!overlay) return;
    overlay.classList.remove('open');
    setTimeout(() => { overlay.innerHTML = ''; }, 200);
}

function modalError(msg) {
    const existing = document.querySelector('.modal-error');
    if (existing) existing.remove();
    const body = document.querySelector('.modal-body');
    if (!body) return;
    const div = document.createElement('div');
    div.className = 'modal-error';
    div.textContent = msg;
    body.insertBefore(div, body.firstChild);
}

            html += `
                <div class="emp-list-item" data-empid="${e.id}">
                    <div class="avatar" data-color="${c}">${initials(e.name)}</div>

                        <div class="emp-list-name">${e.name}</div>

                    </div>

                        <button class="icon-btn" data-action="edit-emp" data-empid="${e.id}" aria-label="Edit">

    html += `</div>`;
    document.getElementById('empDrawerContent').innerHTML = html;

    document.getElementById('empDrawerCloseBtn').addEventListener('click', closeEmployeesDrawer);
    document.getElementById('empAddBtn').addEventListener('click', () => openEmployeeForm(null));
    document.querySelectorAll('[data-action="edit-emp"]').forEach(btn => {
        btn.addEventListener('click', () => openEmployeeForm(btn.dataset.empid));
    });
    document.querySelectorAll('[data-action="delete-emp"]').forEach(btn => {
