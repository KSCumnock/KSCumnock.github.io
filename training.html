<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K&amp;S Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-base: #fafafa;
    --bg-elevated: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #fcfcfd;
    --bg-input: #ffffff;
    --bg-muted: #f4f4f5;

    --border-subtle: #f4f4f5;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;

    --text: #09090b;
    --text-secondary: #52525b;
    --text-tertiary: #71717a;
    --text-quaternary: #a1a1aa;

    --green: #16a34a;
    --green-soft: #dcfce7;
    --green-border: #86efac;
    --green-fg: #14532d;
    --amber: #d97706;
    --amber-soft: #fef3c7;
    --amber-border: #fcd34d;
    --amber-fg: #78350f;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --red-border: #fca5a5;
    --red-fg: #7f1d1d;
    --blue: #2563eb;
    --blue-soft: #dbeafe;
    --blue-border: #93c5fd;
    --blue-fg: #1e3a8a;
    --purple: #9333ea;
    --purple-soft: #f3e8ff;
    --purple-fg: #581c87;
    --gray-soft: #f4f4f5;
    --gray-fg: #52525b;

    --font-ui: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;

    --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 4px 8px -2px rgba(16, 24, 40, 0.06), 0 2px 4px -2px rgba(16, 24, 40, 0.04);
    --shadow-lg: 0 12px 16px -4px rgba(16, 24, 40, 0.08), 0 4px 6px -2px rgba(16, 24, 40, 0.03);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
    background: var(--bg-base);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
}

/* ────────────────────────────────────────────────────────── */
/* TOPBAR — matches timekeeper.html convention                */
/* ────────────────────────────────────────────────────────── */
.topbar {
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
}
.topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex; align-items: center; gap: 24px;
}
.brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.brand-mark {
    width: 38px; height: 38px;
    background: var(--text); color: #fff;
    border-radius: 10px;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    letter-spacing: -0.02em;
}
.brand-text .name { font-weight: 600; font-size: 15px; line-height: 1.1; }
.brand-text .sub  { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }

.toolbar { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.tabs {
    display: flex; gap: 4px;
    background: var(--bg-muted);
    padding: 4px; border-radius: 10px;
}
.tab {
    appearance: none; border: none; background: transparent;
    padding: 8px 14px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    border-radius: 7px; cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
}
.tab:hover { color: var(--text); }
.tab.active {
    background: var(--bg-elevated); color: var(--text);
    box-shadow: var(--shadow-sm);
}

.btn {
    appearance: none;
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 9px 14px;
    border-radius: 9px; border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.04s ease;
}
.btn:hover { background: var(--bg-muted); border-color: var(--border-strong); }
.btn:active { transform: scale(0.98); }
.btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn.primary:hover { background: #000; }
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--bg-muted); }
.btn.danger { color: var(--red-fg); border-color: var(--red-border); }
.btn.danger:hover { background: var(--red-soft); }
.btn.sm { padding: 6px 10px; font-size: 12px; }
.btn.icon { padding: 8px; }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ────────────────────────────────────────────────────────── */
/* MAIN LAYOUT                                                 */
/* ────────────────────────────────────────────────────────── */
main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
}

.kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
}
.kpi {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
}
.kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
}
.kpi-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-quaternary);
    flex-shrink: 0;
}
.kpi-value {
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 500;
    margin-top: 6px;
    letter-spacing: -0.01em;
}
.kpi-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.kpi[data-tone="amber"] .kpi-dot { background: var(--amber); }
.kpi[data-tone="green"] .kpi-dot { background: var(--green); }
.kpi[data-tone="red"] .kpi-dot { background: var(--red); }
.kpi[data-tone="blue"] .kpi-dot { background: var(--blue); }

/* ────────────────────────────────────────────────────────── */
/* FILTER BAR                                                   */
/* ────────────────────────────────────────────────────────── */
.filter-bar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}
.field {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 9px;
}
.field-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary); font-weight: 600;
}
.field select, .field input {
    appearance: none; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 13px; color: var(--text);
    padding: 2px 0;
    min-width: 100px;
}

/* ────────────────────────────────────────────────────────── */
/* BOOKINGS LIST                                                */
/* ────────────────────────────────────────────────────────── */
.bookings {
    display: flex; flex-direction: column; gap: 8px;
}
.booking {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: center;
    transition: background 0.12s ease, border-color 0.12s ease;
}
.booking:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
.booking.attention {
    border-left: 3px solid var(--red);
    padding-left: 13px;
}
.booking.ready {
    border-left: 3px solid var(--green);
    padding-left: 13px;
}
.booking-main { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.booking-row1 {
    display: flex; align-items: baseline; gap: 12px;
    flex-wrap: wrap;
}
.booking-course {
    font-weight: 600; font-size: 15px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
}
.booking-employee {
    font-size: 13px; color: var(--text-secondary); font-weight: 500;
}
.booking-row2 {
    display: flex; align-items: center; gap: 16px;
    font-size: 12px; color: var(--text-tertiary);
    flex-wrap: wrap;
}
.booking-row2 span { display: inline-flex; align-items: center; gap: 4px; }
.booking-row2 svg { width: 13px; height: 13px; }
.booking-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.04em;
    white-space: nowrap;
}
.pill-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
}
.pill.gray   { background: var(--gray-soft);  color: var(--gray-fg); }
.pill.amber  { background: var(--amber-soft); color: var(--amber-fg); }
.pill.green  { background: var(--green-soft); color: var(--green-fg); }
.pill.red    { background: var(--red-soft);   color: var(--red-fg); }
.pill.blue   { background: var(--blue-soft);  color: var(--blue-fg); }
.pill.purple { background: var(--purple-soft); color: var(--purple-fg); }

.kiosk-badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: var(--text-tertiary);
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
}
.kiosk-badge.warn { color: var(--amber-fg); border-color: var(--amber-border); background: var(--amber-soft); }

/* ────────────────────────────────────────────────────────── */
/* MODAL                                                       */
/* ────────────────────────────────────────────────────────── */
.modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: grid; place-items: center;
    padding: 24px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.18s ease, visibility 0.18s ease;
}
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal {
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 540px;
    max-height: calc(100dvh - 48px);
    display: flex; flex-direction: column;
    transform: scale(0.96);
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal.wide { max-width: 720px; }
.modal-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 600; flex: 1; }
.modal-close {
    appearance: none; background: transparent; border: none;
    padding: 6px; border-radius: 7px; cursor: pointer;
    color: var(--text-tertiary);
}
.modal-close:hover { background: var(--bg-muted); color: var(--text); }
.modal-close svg { width: 18px; height: 18px; }
.modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
.modal-footer {
    display: flex; align-items: center; gap: 8px; justify-content: flex-end;
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    background: var(--bg-base);
}
.modal-footer .spacer { flex: 1; }

/* Form */
.form-row { margin-bottom: 14px; }
.form-row.split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.04em;
}
.form-row input, .form-row select, .form-row textarea {
    width: 100%; appearance: none;
    font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    transition: border-color 0.12s ease, box-shadow 0.12s ease;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none; border-color: var(--text);
    box-shadow: 0 0 0 3px rgba(9, 9, 11, 0.06);
}
.form-row textarea { min-height: 70px; resize: vertical; }
.form-row .help { font-size: 12px; color: var(--text-tertiary); margin-top: 4px; }
.check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px; border: 1px solid var(--border);
    border-radius: 9px; background: var(--bg-base);
}
.check-row input[type="checkbox"] { width: 16px; height: 16px; }
.check-row label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 13px; color: var(--text); font-weight: 500; }

.radio-group { display: flex; gap: 8px; }
.radio-group label {
    flex: 1;
    text-align: center;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    text-transform: none; letter-spacing: 0;
    font-size: 13px; font-weight: 500;
    background: var(--bg-input);
    color: var(--text-secondary);
}
.radio-group input { display: none; }
.radio-group input:checked + span { color: var(--text); }
.radio-group label:has(input:checked) {
    border-color: var(--text);
    background: var(--bg-card);
    color: var(--text);
}

/* Credential reveal */
.cred-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    margin-bottom: 10px;
}
.cred-label {
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    min-width: 80px;
}
.cred-value {
    font-family: var(--font-mono); font-size: 14px; color: var(--text);
    flex: 1; word-break: break-all;
}
.cred-blur { filter: blur(6px); user-select: none; }
.cred-copy {
    appearance: none; border: none; background: transparent;
    padding: 6px; border-radius: 6px; cursor: pointer;
    color: var(--text-tertiary);
}
.cred-copy:hover { background: var(--border); color: var(--text); }
.cred-copy svg { width: 16px; height: 16px; }
.cred-portal {
    display: flex; align-items: center; gap: 8px;
    padding: 12px;
    background: var(--blue-soft);
    color: var(--blue-fg);
    border-radius: 9px;
    text-decoration: none; font-size: 13px; font-weight: 500;
    margin-bottom: 12px;
}
.cred-portal:hover { background: #c5dafc; }

.cred-warning {
    background: var(--amber-soft);
    color: var(--amber-fg);
    border-radius: 9px;
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 8px;
}
.cred-warning svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; }

/* Detail rows */
.detail-grid {
    display: grid; grid-template-columns: 110px 1fr;
    gap: 10px 16px;
    font-size: 13px;
    margin-bottom: 16px;
}
.detail-grid dt {
    color: var(--text-tertiary); font-weight: 500;
    text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em;
    align-self: center;
}
.detail-grid dd { margin: 0; color: var(--text); }

.divider {
    border: none; border-top: 1px solid var(--border);
    margin: 18px 0;
}
.section-title {
    font-size: 11px; font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 0 0 10px;
}

.timeline { display: flex; flex-direction: column; gap: 6px; }
.timeline-item {
    display: flex; gap: 10px;
    padding: 8px 10px;
    background: var(--bg-base);
    border-radius: 7px;
    font-size: 12px;
}
.timeline-time {
    font-family: var(--font-mono); color: var(--text-tertiary);
    flex-shrink: 0; min-width: 100px;
}
.timeline-text { color: var(--text); }

/* Toast */
.toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text); color: #fff;
    padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    z-index: 200;
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: var(--shadow-lg);
    max-width: 380px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }

/* Empty state */
.empty {
    background: var(--bg-card);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    color: var(--text-tertiary);
}
.empty-title { color: var(--text); font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.empty-sub { font-size: 13px; }

/* Tab views */
.view { display: none; }
.view.active { display: block; }

/* Providers */
.providers { display: grid; gap: 10px; }
.provider {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
}
.provider-name { font-weight: 600; font-size: 14px; }
.provider-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.provider-actions { margin-left: auto; display: flex; gap: 6px; }

/* Credentials matrix */
.matrix-table {
    width: 100%; border-collapse: collapse;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}
.matrix-table th, .matrix-table td {
    padding: 10px 12px; text-align: left;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 13px;
}
.matrix-table th {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--text-tertiary); font-weight: 600;
    background: var(--bg-base);
}
.matrix-table tbody tr:hover { background: var(--bg-card-hover); }
.matrix-cell {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
}
.matrix-cell.has { background: var(--green-soft); color: var(--green-fg); }
.matrix-cell.missing { background: var(--bg-muted); color: var(--text-tertiary); border: 1px dashed var(--border-strong); }
.matrix-cell:hover { transform: translateY(-1px); }
.matrix-cell svg { width: 12px; height: 12px; }
</style>
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <div class="brand-mark">K&amp;S</div>
            <div class="brand-text">
                <div class="name">Training</div>
                <div class="sub">Kerr &amp; Smith</div>
            </div>
        </div>
        <div class="toolbar">
            <div class="tabs" role="tablist">
                <button class="tab active" data-view="bookings"     role="tab">Bookings</button>
                <button class="tab"        data-view="credentials"  role="tab">Credentials</button>
                <button class="tab"        data-view="providers"    role="tab">Providers</button>
            </div>
            <button class="btn primary" id="newBookingBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New booking
            </button>
        </div>
    </div>
</header>

<main>

    <section class="kpis" id="kpis">
        <div class="kpi" data-tone="amber"><div class="kpi-label"><span class="kpi-dot"></span>Awaiting kiosk</div><div class="kpi-value" id="kpi-awaiting">—</div></div>
        <div class="kpi" data-tone="green"><div class="kpi-label"><span class="kpi-dot"></span>Ready to book</div><div class="kpi-value" id="kpi-ready">—</div></div>
        <div class="kpi" data-tone="red"><div class="kpi-label"><span class="kpi-dot"></span>Needs attention</div><div class="kpi-value" id="kpi-attention">—</div></div>
        <div class="kpi" data-tone="blue"><div class="kpi-label"><span class="kpi-dot"></span>Booked</div><div class="kpi-value" id="kpi-booked">—</div></div>
        <div class="kpi" data-tone="green"><div class="kpi-label"><span class="kpi-dot"></span>Fully booked</div><div class="kpi-value" id="kpi-fully">—</div></div>
        <div class="kpi"><div class="kpi-label"><span class="kpi-dot"></span>Completed (30d)</div><div class="kpi-value" id="kpi-completed">—</div></div>
    </section>

    <section class="view active" id="view-bookings">
        <div class="filter-bar">
            <div class="field">
                <span class="field-label">Status</span>
                <select id="filter-status">
                    <option value="all">All</option>
                    <option value="planned">Planned</option>
                    <option value="kiosk_pending">Awaiting kiosk</option>
                    <option value="kiosk_confirmed">Ready to book</option>
                    <option value="kiosk_conflict">Needs attention</option>
                    <option value="booked">Booked</option>
                    <option value="accommodation_booked">Fully booked</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="field">
                <span class="field-label">Employee</span>
                <select id="filter-employee"><option value="all">All</option></select>
            </div>
            <div class="field" style="flex:1;">
                <span class="field-label">Search</span>
                <input type="search" id="filter-search" placeholder="Course name…" />
            </div>
        </div>
        <div class="bookings" id="bookingsList"></div>
    </section>

    <section class="view" id="view-credentials">
        <div class="filter-bar">
            <div class="field" style="flex:1;">
                <span class="field-label">Filter</span>
                <input type="search" id="cred-search" placeholder="Employee or provider…" />
            </div>
            <button class="btn primary" id="addCredBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add credentials
            </button>
        </div>
        <div id="credentialsMatrix"></div>
    </section>

    <section class="view" id="view-providers">
        <div class="filter-bar">
            <button class="btn primary" id="addProviderBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add provider
            </button>
        </div>
        <div class="providers" id="providersList"></div>
    </section>

</main>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
    WORKER_URL: 'https://training.ske-d03.workers.dev',
    ACTING_USER: 'Sean'
};

const state = {
    bookings: [],
    providers: [],
    employees: [],
    credentials: [],
    stats: {},
    filters: { status: 'all', employee: 'all', search: '' }
};

const $  = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));

function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
}

function fmtDate(s) {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function fmtDateShort(s) {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}
function fmtDateTime(s) {
    if (!s) return '—';
    const d = new Date(s);
    return d.toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function daysAgo(s) {
    if (!s) return 0;
    const ms = Date.now() - new Date(s).getTime();
    return Math.floor(ms / 86400000);
}

async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', 'X-Acting-User': CONFIG.ACTING_USER, ...(opts.headers || {}) };
    const res = await fetch(CONFIG.WORKER_URL + path, { ...opts, headers });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) {
        const e = new Error(body.error || `HTTP ${res.status}`);
        e.status = res.status;
        throw e;
    }
    return body;
}

function toast(msg, kind = '') {
    const t = $('#toast');
    t.textContent = msg;
    t.className = `toast ${kind} show`;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 3500);
}

/* ────────────────────────────────────────────────────────── */
/* DATA LOAD                                                  */
/* ────────────────────────────────────────────────────────── */
async function loadAll() {
    try {
        const [b, p, e, c, s] = await Promise.all([
            api('/api/training/bookings'),
            api('/api/training/providers'),
            api('/api/training/employees'),
            api('/api/training/credentials'),
            api('/api/training/stats')
        ]);
        state.bookings    = b.bookings    || [];
        state.providers   = p.providers   || [];
        state.employees   = e.employees   || [];
        state.credentials = c.credentials || [];
        state.stats       = s.stats       || {};
        renderAll();
    } catch (err) {
        toast(`Couldn't load: ${err.message}`, 'error');
    }
}

function renderAll() {
    renderKpis();
    populateEmployeeFilter();
    renderBookings();
    renderCredentials();
    renderProviders();
}

function renderKpis() {
    const s = state.stats || {};
    $('#kpi-awaiting').textContent  = s.awaiting_kiosk  || 0;
    $('#kpi-ready').textContent     = s.ready_to_book   || 0;
    $('#kpi-attention').textContent = s.needs_attention || 0;
    $('#kpi-booked').textContent    = s.booked          || 0;
    $('#kpi-fully').textContent     = s.fully_booked    || 0;
    $('#kpi-completed').textContent = s.completed_30d   || 0;
}

function populateEmployeeFilter() {
    const sel = $('#filter-employee');
    const current = sel.value;
    sel.innerHTML = '<option value="all">All</option>' +
        state.employees.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('');
    sel.value = current || 'all';
}

/* ────────────────────────────────────────────────────────── */
/* BOOKINGS RENDER                                            */
/* ────────────────────────────────────────────────────────── */
const STATUS_META = {
    planned:              { label: 'Planned',           pill: 'gray' },
    kiosk_pending:        { label: 'Awaiting kiosk',    pill: 'amber' },
    kiosk_confirmed:      { label: 'Ready to book',     pill: 'green' },
    kiosk_conflict:       { label: 'Needs attention',   pill: 'red' },
    booked:               { label: 'Booked',            pill: 'blue' },
    accommodation_booked: { label: 'Fully booked',      pill: 'green' },
    completed:            { label: 'Completed',         pill: 'gray' },
    cancelled:            { label: 'Cancelled',         pill: 'red' }
};

function renderBookings() {
    const f = state.filters;
    const list = state.bookings.filter(b => {
        if (f.status !== 'all'   && b.status !== f.status)        return false;
        if (f.employee !== 'all' && String(b.employee_id) !== String(f.employee)) return false;
        if (f.search && !(b.course_name || '').toLowerCase().includes(f.search.toLowerCase())) return false;
        return true;
    });

    const el = $('#bookingsList');
    if (!list.length) {
        el.innerHTML = `<div class="empty">
            <div class="empty-title">No bookings to show</div>
            <div class="empty-sub">Try a different filter, or create a new booking.</div>
        </div>`;
        return;
    }

    el.innerHTML = list.map(b => {
        const meta = STATUS_META[b.status] || { label: b.status, pill: 'gray' };
        const sameDay = b.start_date === b.end_date;
        const dateStr = sameDay
            ? fmtDateShort(b.start_date)
            : `${fmtDateShort(b.start_date)} → ${fmtDateShort(b.end_date)}`;

        const pendingDays = b.status === 'kiosk_pending' && b.kiosk_pushed_at
            ? daysAgo(b.kiosk_pushed_at) : null;
        const kioskBadge = pendingDays !== null
            ? `<span class="kiosk-badge ${pendingDays >= 2 ? 'warn' : ''}">Sent ${pendingDays === 0 ? 'today' : pendingDays + 'd ago'}</span>`
            : '';

        const accomBit = b.accommodation_required
            ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17h20"/><path d="M2 12h20"/><path d="M4 17V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9"/></svg>${b.accommodation_nights || 1}nt</span>`
            : '';

        const portalBtn = b.status === 'kiosk_confirmed' && b.credential_id
            ? `<button class="btn primary sm" data-act="reveal" data-cred="${b.credential_id}" data-booking="${b.id}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/></svg>
                Open portal
              </button>`
            : '';

        const conflictHint = b.status === 'kiosk_conflict' && b.kiosk_conflict_reason
            ? `<div style="margin-top:4px;font-size:12px;color:var(--red-fg);">
                 <strong>Conflict:</strong> ${escapeHtml(b.kiosk_conflict_reason)}
               </div>`
            : '';

        return `
        <div class="booking ${b.status === 'kiosk_conflict' ? 'attention' : b.status === 'kiosk_confirmed' ? 'ready' : ''}" data-id="${b.id}">
            <div class="booking-main">
                <div class="booking-row1">
                    <span class="pill ${meta.pill}"><span class="pill-dot"></span>${meta.label}</span>
                    <span class="booking-course">${escapeHtml(b.course_name)}</span>
                    ${kioskBadge}
                </div>
                <div class="booking-row2">
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escapeHtml(b.employee_name || '?')}</span>
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</span>
                    <span>${escapeHtml(b.provider_short || b.provider_name || '')}</span>
                    ${b.location ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${escapeHtml(b.location)}</span>` : ''}
                    ${accomBit}
                </div>
                ${conflictHint}
            </div>
            <div class="booking-actions">
                ${portalBtn}
                <button class="btn sm" data-act="open" data-id="${b.id}">Open</button>
            </div>
        </div>`;
    }).join('');
}

$('#filter-status').addEventListener('change', e => {
    state.filters.status = e.target.value; renderBookings();
});
$('#filter-employee').addEventListener('change', e => {
    state.filters.employee = e.target.value; renderBookings();
});
$('#filter-search').addEventListener('input', e => {
    state.filters.search = e.target.value; renderBookings();
});

$('#bookingsList').addEventListener('click', async (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'open') {
        openBookingDetail(parseInt(btn.dataset.id, 10));
    } else if (act === 'reveal') {
        openRevealModal(parseInt(btn.dataset.cred, 10), parseInt(btn.dataset.booking, 10));
    }
});

/* ────────────────────────────────────────────────────────── */
/* MODALS                                                     */
/* ────────────────────────────────────────────────────────── */
function openModal(html, wide = false) {
    const m = $('#modal');
    m.className = 'modal' + (wide ? ' wide' : '');
    m.innerHTML = html;
    $('#modalOverlay').classList.add('show');
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    $('#modalOverlay').classList.remove('show');
    document.body.style.overflow = '';
}
$('#modalOverlay').addEventListener('click', e => {
    if (e.target === $('#modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ────────────────────────────────────────────────────────── */
/* NEW BOOKING                                                */
/* ────────────────────────────────────────────────────────── */
$('#newBookingBtn').addEventListener('click', () => openNewBooking());

function openNewBooking() {
    const empOpts = state.employees.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('');
    const provOpts = state.providers.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
    const today = new Date().toISOString().slice(0, 10);

    openModal(`
        <div class="modal-header">
            <div class="modal-title">New booking</div>
            <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            <div class="form-row split">
                <div><label>Employee</label><select id="nb-employee"><option value="">Choose…</option>${empOpts}</select></div>
                <div><label>Provider</label><select id="nb-provider"><option value="">Choose…</option>${provOpts}</select></div>
            </div>
            <div class="form-row"><label>Course name</label><input type="text" id="nb-course" placeholder="e.g. Vauxhall EV diagnostics — Level 3" /></div>
            <div class="form-row">
                <label>Type</label>
                <div class="radio-group">
                    <label><input type="radio" name="nb-type" value="classroom" checked><span>Classroom</span></label>
                    <label><input type="radio" name="nb-type" value="online"><span>Online</span></label>
                </div>
            </div>
            <div class="form-row split">
                <div><label>Start date</label><input type="date" id="nb-start" value="${today}" /></div>
                <div><label>End date</label><input type="date" id="nb-end" value="${today}" /></div>
            </div>
            <div class="form-row"><label>Location</label><input type="text" id="nb-location" placeholder="e.g. Vauxhall Academy, Luton" /></div>
            <div class="form-row split">
                <div class="check-row" style="height:42px;align-self:end;"><input type="checkbox" id="nb-accom" /><label for="nb-accom">Needs overnight stay</label></div>
                <div><label>Nights</label><input type="number" id="nb-nights" value="0" min="0" max="10" /></div>
            </div>
            <div class="form-row"><label>Notes</label><textarea id="nb-notes" placeholder="Cost estimate, prerequisites, anything to remember…"></textarea></div>
            <div id="nb-cred-warning" style="display:none;"></div>
            <div id="nb-conflict-warning" style="display:none;"></div>
            <div class="check-row" style="margin-top:8px;"><input type="checkbox" id="nb-push" checked /><label for="nb-push">Push kiosk confirmation immediately</label></div>
        </div>
        <div class="modal-footer">
            <button class="btn ghost" onclick="closeModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn primary" id="nb-submit">Create booking</button>
        </div>
    `);

    const checkCreds = async () => {
        const emp = $('#nb-employee').value;
        const prov = $('#nb-provider').value;
        const warn = $('#nb-cred-warning');
        if (!emp || !prov) { warn.style.display = 'none'; return; }
        try {
            const r = await api(`/api/training/credentials/check?employee_id=${emp}&provider_id=${prov}`);
            if (!r.exists) {
                warn.innerHTML = `<div class="cred-warning">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    No portal credentials stored for this employee + provider yet. You'll need to add them before you can book on the portal.
                </div>`;
                warn.style.display = 'block';
            } else {
                warn.style.display = 'none';
            }
        } catch { warn.style.display = 'none'; }
    };
    $('#nb-employee').addEventListener('change', checkCreds);
    $('#nb-provider').addEventListener('change', checkCreds);

    const checkConflicts = async () => {
        const emp = $('#nb-employee').value;
        const start = $('#nb-start').value;
        const end = $('#nb-end').value;
        const warn = $('#nb-conflict-warning');
        if (!emp || !start || !end) { warn.style.display = 'none'; return; }
        try {
            const r = await api('/api/training/bookings/check-conflicts', {
                method: 'POST',
                body: JSON.stringify({ employee_id: parseInt(emp, 10), start_date: start, end_date: end })
            });
            const conflicts = (r.conflicts || []).filter(c => !c.is_training);
            if (conflicts.length) {
                const lines = conflicts.map(c => {
                    const range = c.start_date === c.end_date ? fmtDateShort(c.start_date)
                        : `${fmtDateShort(c.start_date)} → ${fmtDateShort(c.end_date)}`;
                    const type = c.request_type === 'sick' ? 'Sick leave'
                        : c.request_type === 'bereavement' ? 'Bereavement' : 'Holiday';
                    return `<li>${type} · ${range}${c.reason ? ` — ${escapeHtml(c.reason)}` : ''}</li>`;
                }).join('');
                warn.innerHTML = `<div class="cred-warning" style="background:var(--red-soft);color:var(--red-fg);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <div><strong>${conflicts.length === 1 ? 'Leave conflict' : `${conflicts.length} leave conflicts`}</strong> for these dates:<ul style="margin:4px 0 0;padding-left:20px;">${lines}</ul></div>
                </div>`;
                warn.style.display = 'block';
            } else {
                warn.style.display = 'none';
            }
        } catch { warn.style.display = 'none'; }
    };
    $('#nb-employee').addEventListener('change', checkConflicts);
    $('#nb-start').addEventListener('change', checkConflicts);
    $('#nb-end').addEventListener('change', checkConflicts);

    $('#nb-accom').addEventListener('change', e => {
        if (e.target.checked && $('#nb-nights').value === '0') $('#nb-nights').value = '1';
        if (!e.target.checked) $('#nb-nights').value = '0';
    });

    $('#nb-submit').addEventListener('click', async () => {
        const payload = {
            employee_id: parseInt($('#nb-employee').value, 10),
            provider_id: parseInt($('#nb-provider').value, 10),
            course_name: $('#nb-course').value.trim(),
            course_type: $$('input[name="nb-type"]').find(r => r.checked).value,
            start_date: $('#nb-start').value,
            end_date: $('#nb-end').value,
            location: $('#nb-location').value.trim() || null,
            accommodation_required: $('#nb-accom').checked,
            accommodation_nights: parseInt($('#nb-nights').value, 10) || 0,
            notes: $('#nb-notes').value.trim() || null,
            push_kiosk_now: $('#nb-push').checked
        };
        if (!payload.employee_id || !payload.provider_id || !payload.course_name) {
            toast('Employee, provider and course name are required', 'error');
            return;
        }
        try {
            await api('/api/training/bookings', { method: 'POST', body: JSON.stringify(payload) });
            toast('Booking created', 'success');
            closeModal();
            loadAll();
        } catch (err) { toast(err.message, 'error'); }
    });
}

/* ────────────────────────────────────────────────────────── */
/* BOOKING DETAIL                                             */
/* ────────────────────────────────────────────────────────── */
async function openBookingDetail(id) {
    try {
        const { booking, prompts } = await api(`/api/training/bookings/${id}`);
        const meta = STATUS_META[booking.status] || { label: booking.status, pill: 'gray' };
        const sameDay = booking.start_date === booking.end_date;
        const dateStr = sameDay
            ? fmtDateShort(booking.start_date)
            : `${fmtDateShort(booking.start_date)} → ${fmtDateShort(booking.end_date)}`;

        const promptHtml = (prompts || []).length
            ? `<div class="timeline">${prompts.map(p => `
                <div class="timeline-item">
                    <span class="timeline-time">${fmtDateTime(p.pushed_at)}</span>
                    <span class="timeline-text">
                        Pushed to kiosk${p.responded_at
                            ? ` · responded <strong>${escapeHtml(p.response)}</strong>${p.conflict_reason ? ` (${escapeHtml(p.conflict_reason)})` : ''}`
                            : ' · awaiting'}
                    </span>
                </div>`).join('')}</div>`
            : `<div class="empty" style="padding:16px;"><div class="empty-sub">No kiosk activity yet</div></div>`;

        const actions = [];
        if (['planned'].includes(booking.status)) {
            actions.push(`<button class="btn" data-act="push">Push to kiosk now</button>`);
        }
        if (['kiosk_pending', 'kiosk_conflict'].includes(booking.status)) {
            actions.push(`<button class="btn" data-act="push">Re-push kiosk</button>`);
        }
        if (booking.status === 'kiosk_confirmed') {
            actions.push(`<button class="btn primary" data-act="mark-booked">Mark booked on portal</button>`);
        }
        if (booking.status === 'booked' && booking.accommodation_required) {
            actions.push(`<button class="btn primary" data-act="mark-accom">Mark accommodation booked</button>`);
        }
        if (['booked', 'accommodation_booked'].includes(booking.status)) {
            actions.push(`<button class="btn" data-act="mark-complete">Mark complete</button>`);
        }
        if (!['cancelled', 'completed'].includes(booking.status)) {
            actions.push(`<button class="btn danger" data-act="cancel">Cancel booking</button>`);
        }

        openModal(`
            <div class="modal-header">
                <span class="pill ${meta.pill}"><span class="pill-dot"></span>${meta.label}</span>
                <div class="modal-title" style="font-size:15px;">${escapeHtml(booking.course_name)}</div>
                <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <dl class="detail-grid">
                    <dt>Employee</dt><dd>${escapeHtml(booking.employee_name || '?')}</dd>
                    <dt>Provider</dt><dd>${escapeHtml(booking.provider_name || '')}</dd>
                    <dt>Type</dt><dd>${escapeHtml(booking.course_type)}</dd>
                    <dt>Dates</dt><dd>${dateStr}</dd>
                    ${booking.location ? `<dt>Location</dt><dd>${escapeHtml(booking.location)}</dd>` : ''}
                    ${booking.accommodation_required ? `<dt>Accommodation</dt><dd>${booking.accommodation_nights || 1} night(s)${booking.accommodation_venue ? ` · ${escapeHtml(booking.accommodation_venue)}` : ''}</dd>` : ''}
                    ${booking.course_conf_ref ? `<dt>Course ref</dt><dd><code>${escapeHtml(booking.course_conf_ref)}</code></dd>` : ''}
                    ${booking.accommodation_conf_ref ? `<dt>Accom. ref</dt><dd><code>${escapeHtml(booking.accommodation_conf_ref)}</code></dd>` : ''}
                    ${booking.notes ? `<dt>Notes</dt><dd>${escapeHtml(booking.notes)}</dd>` : ''}
                    <dt>Created</dt><dd>${fmtDateTime(booking.created_at)}${booking.created_by ? ` by ${escapeHtml(booking.created_by)}` : ''}</dd>
                </dl>
                <hr class="divider"/>
                <h4 class="section-title">Kiosk activity</h4>
                ${promptHtml}
            </div>
            <div class="modal-footer" style="flex-wrap:wrap;gap:8px;">
                <button class="btn ghost" onclick="closeModal()">Close</button>
                <div class="spacer"></div>
                ${actions.join('')}
            </div>
        `, true);

        $('#modal').addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-act]');
            if (!btn) return;
            const act = btn.dataset.act;
            try {
                if (act === 'push') {
                    await api(`/api/training/bookings/${id}/repush`, { method: 'POST' });
                    toast('Kiosk prompt sent', 'success');
                } else if (act === 'mark-booked') {
                    const ref = prompt('Course confirmation reference?');
                    if (!ref) return;
                    await api(`/api/training/bookings/${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ status: 'booked', course_conf_ref: ref })
                    });
                    toast('Marked booked', 'success');
                } else if (act === 'mark-accom') {
                    const ref = prompt('Accommodation confirmation reference?');
                    if (!ref) return;
                    const venue = prompt('Venue name (optional)?');
                    await api(`/api/training/bookings/${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({
                            status: 'accommodation_booked',
                            accommodation_conf_ref: ref,
                            accommodation_venue: venue || null
                        })
                    });
                    toast('Accommodation marked booked', 'success');
                } else if (act === 'mark-complete') {
                    await api(`/api/training/bookings/${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ status: 'completed', completed_at: new Date().toISOString() })
                    });
                    toast('Marked complete', 'success');
                } else if (act === 'cancel') {
                    const reason = prompt('Reason for cancellation?') || '';
                    if (reason === null) return;
                    await api(`/api/training/bookings/${id}?reason=${encodeURIComponent(reason)}`, { method: 'DELETE' });
                    toast('Booking cancelled', 'success');
                }
                closeModal();
                loadAll();
            } catch (err) { toast(err.message, 'error'); }
        });
    } catch (err) { toast(err.message, 'error'); }
}

/* ────────────────────────────────────────────────────────── */
/* CREDENTIALS                                                 */
/* ────────────────────────────────────────────────────────── */
function renderCredentials() {
    const search = ($('#cred-search')?.value || '').toLowerCase();
    const grid = state.employees.map(emp => {
        const row = state.providers.map(prov => {
            const cred = state.credentials.find(c => c.employee_id === emp.id && c.provider_id === prov.id);
            return { prov, cred };
        });
        return { emp, row };
    }).filter(({ emp }) => !search || emp.name.toLowerCase().includes(search));

    if (!state.employees.length) {
        $('#credentialsMatrix').innerHTML = `<div class="empty">
            <div class="empty-title">No employees loaded</div>
            <div class="empty-sub">Check the worker's /employees endpoint.</div>
        </div>`;
        return;
    }

    $('#credentialsMatrix').innerHTML = `
        <table class="matrix-table">
            <thead><tr>
                <th>Employee</th>
                ${state.providers.map(p => `<th>${escapeHtml(p.short_name || p.name)}</th>`).join('')}
            </tr></thead>
            <tbody>
                ${grid.map(({ emp, row }) => `
                    <tr>
                        <td><strong>${escapeHtml(emp.name)}</strong></td>
                        ${row.map(({ prov, cred }) => `
                            <td>
                                ${cred
                                    ? `<button class="matrix-cell has" data-cred="${cred.id}" data-act="reveal" title="Last used ${cred.last_used_at ? fmtDateTime(cred.last_used_at) : 'never'}">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                        ${cred.login_email ? escapeHtml(cred.login_email) : 'Stored'}
                                       </button>`
                                    : `<button class="matrix-cell missing" data-emp="${emp.id}" data-prov="${prov.id}" data-act="add">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                        Add
                                       </button>`}
                            </td>`).join('')}
                    </tr>`).join('')}
            </tbody>
        </table>
    `;
}

$('#credentialsMatrix').addEventListener('click', e => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    if (btn.dataset.act === 'reveal') {
        openRevealModal(parseInt(btn.dataset.cred, 10));
    } else if (btn.dataset.act === 'add') {
        openAddCredModal(parseInt(btn.dataset.emp, 10), parseInt(btn.dataset.prov, 10));
    }
});

$('#cred-search').addEventListener('input', renderCredentials);
$('#addCredBtn').addEventListener('click', () => openAddCredModal());

async function openRevealModal(credId, bookingId = null) {
    const cred = state.credentials.find(c => c.id === credId);
    const portalUrl = cred ? state.providers.find(p => p.id === cred.provider_id)?.portal_url : '';

    openModal(`
        <div class="modal-header">
            <div class="modal-title">Portal credentials</div>
            <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            ${cred ? `
                <div class="detail-grid" style="margin-bottom:14px;">
                    <dt>Employee</dt><dd>${escapeHtml(cred.employee_name || '?')}</dd>
                    <dt>Provider</dt><dd>${escapeHtml(cred.provider_name || '?')}</dd>
                    ${cred.last_used_at ? `<dt>Last used</dt><dd>${fmtDateTime(cred.last_used_at)} by ${escapeHtml(cred.last_used_by || '—')}</dd>` : ''}
                </div>
            ` : ''}
            <div class="cred-warning">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Revealing logs this access. Copy what you need, then close.
            </div>
            ${portalUrl ? `<a class="cred-portal" href="${escapeHtml(portalUrl)}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Open ${escapeHtml(state.providers.find(p => p.id === cred?.provider_id)?.short_name || 'portal')}
            </a>` : ''}
            <div id="cred-content" style="text-align:center;padding:20px;">
                <button class="btn primary" id="reveal-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Reveal credentials
                </button>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn ghost" onclick="closeModal()">Close</button>
        </div>
    `);

    $('#reveal-btn').addEventListener('click', async () => {
        try {
            const r = await api(`/api/training/credentials/${credId}/reveal`, {
                method: 'POST',
                body: JSON.stringify({ booking_id: bookingId })
            });
            $('#cred-content').innerHTML = `
                <div class="cred-row">
                    <span class="cred-label">User</span>
                    <span class="cred-value" id="rv-user">${escapeHtml(r.username)}</span>
                    <button class="cred-copy" data-copy="rv-user" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                </div>
                <div class="cred-row">
                    <span class="cred-label">Pass</span>
                    <span class="cred-value" id="rv-pass">${escapeHtml(r.password)}</span>
                    <button class="cred-copy" data-copy="rv-pass" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                </div>
                ${r.notes ? `<div class="cred-row"><span class="cred-label">Notes</span><span class="cred-value" style="font-family:var(--font-ui);font-size:13px;">${escapeHtml(r.notes)}</span></div>` : ''}
            `;
            $$('.cred-copy').forEach(btn => btn.addEventListener('click', () => {
                const text = $('#' + btn.dataset.copy).textContent;
                navigator.clipboard.writeText(text).then(() => toast('Copied', 'success'));
            }));
        } catch (err) { toast(err.message, 'error'); }
    });
}

function openAddCredModal(prefillEmp = null, prefillProv = null) {
    const empOpts = state.employees.map(e => `<option value="${e.id}" ${e.id === prefillEmp ? 'selected' : ''}>${escapeHtml(e.name)}</option>`).join('');
    const provOpts = state.providers.map(p => `<option value="${p.id}" ${p.id === prefillProv ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('');

    openModal(`
        <div class="modal-header">
            <div class="modal-title">Store portal credentials</div>
            <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            <div class="cred-warning">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Encrypted with AES-256-GCM before storage. The plaintext is never written to disk.
            </div>
            <div class="form-row split">
                <div><label>Employee</label><select id="ac-employee">${empOpts}</select></div>
                <div><label>Provider</label><select id="ac-provider">${provOpts}</select></div>
            </div>
            <div class="form-row"><label>Username</label><input type="text" id="ac-username" autocomplete="off" /></div>
            <div class="form-row"><label>Password</label><input type="password" id="ac-password" autocomplete="off" /></div>
            <div class="form-row"><label>Login email (displayed in matrix)</label><input type="email" id="ac-email" placeholder="optional" /></div>
            <div class="form-row"><label>Notes</label><textarea id="ac-notes" placeholder="e.g. account uses personal email — Bob set up Sep 2025"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn ghost" onclick="closeModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn primary" id="ac-submit">Save credentials</button>
        </div>
    `);

    $('#ac-submit').addEventListener('click', async () => {
        const payload = {
            employee_id: parseInt($('#ac-employee').value, 10),
            provider_id: parseInt($('#ac-provider').value, 10),
            username: $('#ac-username').value,
            password: $('#ac-password').value,
            login_email: $('#ac-email').value.trim() || null,
            notes: $('#ac-notes').value.trim() || null
        };
        if (!payload.employee_id || !payload.provider_id || !payload.username || !payload.password) {
            toast('Employee, provider, username and password required', 'error');
            return;
        }
        try {
            await api('/api/training/credentials', { method: 'POST', body: JSON.stringify(payload) });
            toast('Credentials saved', 'success');
            closeModal();
            loadAll();
        } catch (err) { toast(err.message, 'error'); }
    });
}

/* ────────────────────────────────────────────────────────── */
/* PROVIDERS                                                  */
/* ────────────────────────────────────────────────────────── */
function renderProviders() {
    const el = $('#providersList');
    if (!state.providers.length) {
        el.innerHTML = `<div class="empty"><div class="empty-title">No providers yet</div><div class="empty-sub">Add Vauxhall, Stellantis, KGM etc.</div></div>`;
        return;
    }
    el.innerHTML = state.providers.map(p => `
        <div class="provider">
            <div style="flex:1;">
                <div class="provider-name">${escapeHtml(p.name)}</div>
                <div class="provider-meta">${p.short_name ? `${escapeHtml(p.short_name)} · ` : ''}${p.portal_url ? escapeHtml(p.portal_url) : 'No portal URL'}${p.notes ? ` · ${escapeHtml(p.notes)}` : ''}</div>
            </div>
            <div class="provider-actions">
                ${p.portal_url ? `<a class="btn sm" href="${escapeHtml(p.portal_url)}" target="_blank" rel="noopener">Open</a>` : ''}
            </div>
        </div>
    `).join('');
}

$('#addProviderBtn').addEventListener('click', () => {
    openModal(`
        <div class="modal-header">
            <div class="modal-title">Add provider</div>
            <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            <div class="form-row"><label>Name</label><input type="text" id="ap-name" placeholder="e.g. Bosch Automotive Service Solutions" /></div>
            <div class="form-row"><label>Short name</label><input type="text" id="ap-short" placeholder="e.g. Bosch" /></div>
            <div class="form-row"><label>Portal URL</label><input type="url" id="ap-url" placeholder="https://…" /></div>
            <div class="form-row"><label>Notes</label><textarea id="ap-notes" placeholder="Registration quirks, contact name, etc."></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn ghost" onclick="closeModal()">Cancel</button>
            <div class="spacer"></div>
            <button class="btn primary" id="ap-submit">Add</button>
        </div>
    `);
    $('#ap-submit').addEventListener('click', async () => {
        const payload = {
            name: $('#ap-name').value.trim(),
            short_name: $('#ap-short').value.trim() || null,
            portal_url: $('#ap-url').value.trim() || null,
            notes: $('#ap-notes').value.trim() || null
        };
        if (!payload.name) { toast('Name required', 'error'); return; }
        try {
            await api('/api/training/providers', { method: 'POST', body: JSON.stringify(payload) });
            toast('Provider added', 'success');
            closeModal();
            loadAll();
        } catch (err) { toast(err.message, 'error'); }
    });
});

/* ────────────────────────────────────────────────────────── */
/* TABS                                                       */
/* ────────────────────────────────────────────────────────── */
$$('.tab').forEach(t => t.addEventListener('click', () => {
    $$('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $$('.view').forEach(v => v.classList.remove('active'));
    $('#view-' + t.dataset.view).classList.add('active');
}));

window.closeModal = closeModal;

loadAll();
setInterval(loadAll, 60_000);
</script>
</body>
</html>
